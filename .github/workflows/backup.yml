name: Sauvegarde quotidienne

on:
  schedule:
    - cron: '0 3 * * *'   # tous les jours à 03h00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer l'état depuis Supabase
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          URL="https://prwdtdmdkhzwfyivaepw.supabase.co/rest/v1/oilroxwood_etat?id=eq.2&select=data"
          KEY="sb_publishable_qgN4fRX9eVdKn3SWAjtmhw_F00rlqXz"
          curl -s "$URL" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); open('backups/$DATE.json','w').write(json.dumps(d[0]['data'],ensure_ascii=False,indent=1) if d else '{}')"
          echo "Sauvegarde du $DATE : $(wc -c < backups/$DATE.json) octets"
          # ne garde que les 30 dernières sauvegardes
          ls -1t backups/*.json 2>/dev/null | tail -n +31 | xargs -r rm -f

      - name: Commit
        run: |
          git config user.name "oilroxwood-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || (git commit -m "💾 Sauvegarde du jour" && git push)
