<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oil Roxwood — Dashboard Admin</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b111b; --panel:#121a28; --panel-2:#182337; --line:rgba(255,255,255,.07);
    --ink:#e8edf4; --muted:#8494a9; --accent:#e8a020; --accent-2:#f5b23a;
    --green:#3ddc84; --red:#ff5c5c; --blue:#5aa0ff; --violet:#a78bfa;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}

  /* ========== LOGIN ========== */
  #login{
    position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 70% 20%, rgba(232,160,32,.12), transparent 55%),
      linear-gradient(160deg,#0b111b,#16202e);
  }
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:44px 40px;width:min(400px,90vw);text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .login-card .drop{font-size:2.6rem}
  .login-card h1{font-size:1.3rem;margin:10px 0 4px;letter-spacing:1px}
  .login-card h1 b{color:var(--accent)}
  .login-card p{color:var(--muted);font-size:.85rem;margin-bottom:24px}
  .login-card input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);font-size:1rem;text-align:center;letter-spacing:2px}
  .login-card input:focus{outline:none;border-color:var(--accent)}
  .login-card button{width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:var(--accent);color:#0b111b;font-weight:800;font-size:.95rem;transition:transform .15s}
  .login-card button:hover{transform:translateY(-2px)}
  #loginErr{color:var(--red);font-size:.83rem;margin-top:12px;display:none}

  /* ========== LAYOUT ========== */
  #app{display:none;min-height:100vh}
  aside{
    position:fixed;top:0;left:0;bottom:0;width:230px;background:var(--panel);
    border-right:1px solid var(--line);padding:26px 16px;display:flex;flex-direction:column;z-index:50
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 10px 24px;font-weight:800;letter-spacing:.5px}
  .brand img{animation:logoFloat 4s ease-in-out infinite;cursor:pointer}
  .brand img:hover{animation:logoSpin .7s cubic-bezier(.34,1.56,.64,1)}
  @keyframes logoFloat{
    0%,100%{transform:translateY(0);filter:drop-shadow(0 0 4px rgba(232,160,32,.25))}
    50%{transform:translateY(-4px);filter:drop-shadow(0 4px 10px rgba(232,160,32,.55))}
  }
  @keyframes logoSpin{to{transform:rotate(360deg) scale(1.12)}}
  .brand small{display:block;color:var(--muted);font-weight:500;font-size:.7rem;letter-spacing:1.5px}
  .brand b{color:var(--accent)}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:none;background:none;
    color:var(--muted);font-size:.92rem;font-weight:600;width:100%;text-align:left;margin-bottom:4px;transition:all .15s
  }
  .nav-item:hover{background:var(--panel-2);color:var(--ink)}
  .nav-item.active{background:linear-gradient(135deg,rgba(232,160,32,.18),rgba(232,160,32,.06));color:var(--accent)}
  aside .spacer{flex:1}
  #logout{color:var(--red)}
  main{margin-left:230px;padding:34px 38px;max-width:1250px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:14px}
  .topbar h2{font-size:1.5rem;letter-spacing:-.3px}
  .topbar .sub{color:var(--muted);font-size:.85rem;margin-top:2px}

  /* ========== COMPONENTS ========== */
  .grid{display:grid;gap:18px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
  .panel h3{font-size:.95rem;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .kpi{position:relative;overflow:hidden}
  .kpi .lbl{color:var(--muted);font-size:.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .kpi .val{font-size:1.9rem;font-weight:800;margin-top:6px}
  .kpi .delta{font-size:.78rem;color:var(--muted);margin-top:4px}
  .kpi::after{content:"";position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,32,.15),transparent 70%)}
  .btn{padding:10px 18px;border-radius:9px;border:none;font-weight:700;font-size:.86rem;transition:transform .12s}
  .btn:hover{transform:translateY(-1px)}
  .btn-gold{background:var(--accent);color:#0b111b}
  .btn-ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
  .btn-red{background:rgba(255,92,92,.12);color:var(--red);border:1px solid rgba(255,92,92,.3)}
  .btn-sm{padding:6px 12px;font-size:.78rem;border-radius:7px}

  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th{text-align:left;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:1.2px;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .15s}
  tbody tr:hover{background:rgba(255,255,255,.02)}

  .badge{display:inline-block;padding:3px 11px;border-radius:99px;font-size:.72rem;font-weight:700;white-space:nowrap}
  .bg0{background:rgba(255,255,255,.08);color:#c2cad4}
  .bg1{background:rgba(90,160,255,.14);color:var(--blue)}
  .bg2{background:rgba(167,139,250,.14);color:var(--violet)}
  .bg3{background:rgba(232,160,32,.16);color:var(--accent)}
  .zone-tag{display:inline-block;width:26px;height:26px;border-radius:8px;text-align:center;line-height:26px;font-weight:800;font-size:.8rem}
  .zA{background:rgba(232,160,32,.16);color:var(--accent)}
  .zB{background:rgba(90,160,255,.14);color:var(--blue)}
  .zC{background:rgba(61,220,132,.13);color:var(--green)}
  .zD{background:rgba(167,139,250,.14);color:var(--violet)}

  .prog{height:7px;background:var(--panel-2);border-radius:99px;overflow:hidden;min-width:90px}
  .prog i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .4s}
  .prog i.full{background:linear-gradient(90deg,#2eb872,var(--green))}
  .pct{font-size:.72rem;color:var(--muted);margin-top:4px}

  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:99px;padding:5px 13px;font-size:.78rem;color:var(--muted)}
  .chip b{color:var(--ink)}
  .up{color:var(--green)} .down{color:var(--red)} .gold{color:var(--accent)}

  input.field,select.field{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 13px;font-size:.88rem;width:100%}
  input.field:focus,select.field:focus{outline:none;border-color:var(--accent)}
  label.f-lbl{display:block;font-size:.75rem;color:var(--muted);font-weight:700;margin:0 0 6px;text-transform:uppercase;letter-spacing:1px}
  .f-row{margin-bottom:14px}

  /* modal */
  #modalBg{position:fixed;inset:0;background:rgba(5,8,14,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
  #modalBg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px;width:min(460px,92vw);max-height:88vh;overflow:auto}
  .modal h3{margin-bottom:20px;font-size:1.05rem}

  /* toast */
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel-2);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:13px 22px;font-size:.88rem;z-index:500;transition:transform .3s;box-shadow:0 15px 40px rgba(0,0,0,.4)}
  #toast.show{transform:translateX(-50%) translateY(0)}

  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem}
  .podium{display:flex;gap:14px;align-items:flex-end;justify-content:center;padding:10px 0}
  .pod{flex:1;text-align:center;border-radius:12px 12px 0 0;padding:14px 8px;display:flex;flex-direction:column;justify-content:flex-end}
  .pod .name{font-weight:800;font-size:.85rem}
  .pod .amt{font-size:.75rem;color:var(--muted);margin-top:3px}
  .pod1{background:linear-gradient(180deg,rgba(232,160,32,.25),rgba(232,160,32,.05));min-height:130px;border-top:3px solid var(--accent)}
  .pod2{background:linear-gradient(180deg,rgba(160,175,195,.2),rgba(160,175,195,.04));min-height:100px;border-top:3px solid #a8b6c8}
  .pod3{background:linear-gradient(180deg,rgba(190,120,60,.2),rgba(190,120,60,.04));min-height:80px;border-top:3px solid #c07840}
  .warn{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.25);border-radius:10px;padding:11px 15px;font-size:.83rem;color:#ffb0b0;margin-bottom:16px}
  /* feuilles */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{padding:8px 16px;border-radius:99px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:.82rem;font-weight:700;transition:all .15s}
  .tab:hover{color:var(--ink)}
  .tab.on{background:linear-gradient(135deg,rgba(232,160,32,.2),rgba(232,160,32,.07));color:var(--accent);border-color:rgba(232,160,32,.4)}
  .sheet td{padding:4px 6px}
  .sheet input[type=text],.sheet input[type=number],.sheet input[type=date]{background:transparent;border:1px solid transparent;color:var(--ink);border-radius:6px;padding:6px 8px;font-size:.84rem;width:100%;min-width:70px}
  .sheet input:hover{border-color:var(--line)}
  .sheet input:focus{outline:none;border-color:var(--accent);background:var(--panel-2)}
  .sheet input[type=number]{text-align:right}
  .sheet input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .sheet .calc{font-weight:700;text-align:right;padding:6px 8px;white-space:nowrap}
  .sheet tfoot td{font-weight:800;color:var(--accent);border-top:2px solid var(--line);padding:10px 8px;text-align:right}
  .sheet tfoot td:first-child{text-align:left}
  /* combo clients (autocomplete) */
  .combo{position:relative}
  .combo-list{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:80;display:none;
    background:linear-gradient(165deg,rgba(25,34,52,.97),rgba(15,22,35,.99));backdrop-filter:blur(14px);
    border:1px solid rgba(255,45,149,.28);border-radius:12px;max-height:300px;overflow:auto;
    box-shadow:0 22px 55px rgba(0,0,0,.55), 0 0 26px rgba(139,92,246,.18)}
  .combo-list.open{display:block;animation:fadeUp .18s cubic-bezier(.2,.7,.3,1)}
  .combo-item{padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;
    font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s}
  .combo-item:last-child{border-bottom:none}
  .combo-item small{color:var(--muted);font-size:.75rem;white-space:nowrap}
  .combo-item:hover,.combo-item.sel{background:linear-gradient(90deg,rgba(255,45,149,.16),rgba(139,92,246,.07))}
  .combo-item .match{color:var(--accent);font-weight:800}
  .combo-count{position:sticky;top:0;background:rgba(15,22,35,.98);padding:8px 16px;font-size:.72rem;color:var(--muted);
    letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06)}
  /* facture imprimable */
  #printZone{display:none}
  @media print{
    body>*{display:none!important}
    #printZone{display:block!important;position:absolute;top:0;left:0;width:100%;background:#fff;color:#111}
  }
  .inv{font-family:'Segoe UI',system-ui,sans-serif;max-width:760px;margin:0 auto;padding:40px;color:#111}
  .inv-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #e8a020;padding-bottom:18px}
  .inv h1{font-size:1.6rem;color:#1b2739}
  .inv h1 b{color:#c4841a}
  .inv .co{font-size:.82rem;color:#444;line-height:1.6}
  .inv-num{text-align:right;font-size:.9rem}
  .inv-num .n{font-size:1.3rem;font-weight:800;color:#c4841a}
  .inv-client{margin:24px 0;display:flex;justify-content:flex-end}
  .inv-client div{background:#f5f6f8;border-radius:8px;padding:14px 20px;font-size:.88rem;line-height:1.7;min-width:240px}
  .inv table{width:100%;border-collapse:collapse;font-size:.85rem;margin:10px 0 20px}
  .inv th{background:#1b2739;color:#fff;padding:9px 10px;text-align:left;font-size:.75rem;letter-spacing:1px;text-transform:uppercase}
  .inv td{padding:8px 10px;border-bottom:1px solid #e3e5e9;color:#222}
  .inv .tots{display:flex;justify-content:flex-end}
  .inv .tots table{width:auto;min-width:280px}
  .inv .tots td{border:none;padding:5px 10px}
  .inv .tots tr:last-child td{border-top:2px solid #1b2739;font-weight:800;font-size:1rem;color:#c4841a}
  .inv .foot{margin-top:34px;display:flex;justify-content:space-between;font-size:.78rem;color:#555}
  .inv .sig{text-align:center}
  .inv .sig .line{margin-top:34px;border-top:1px solid #999;padding-top:6px;min-width:170px}
  .promo-flag{font-size:.7rem;color:var(--green);font-weight:700;display:block;margin-top:3px}

  /* ================== UI PREMIUM ================== */
  ::selection{background:rgba(232,160,32,.35)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#2a3850,#1b2436);border-radius:99px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--accent),#b87e14)}

  #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
  main{position:relative;z-index:1}

  /* verre dépoli + halo */
  .panel{
    background:linear-gradient(165deg,rgba(25,34,52,.88),rgba(15,22,35,.94));
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 10px 34px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .25s cubic-bezier(.2,.7,.3,1), box-shadow .25s, border-color .25s;
  }
  .panel:hover{border-color:rgba(232,160,32,.22);box-shadow:0 16px 44px rgba(0,0,0,.35), 0 0 0 1px rgba(232,160,32,.08), inset 0 1px 0 rgba(255,255,255,.06)}
  .kpi:hover{transform:translateY(-5px)}
  .kpi .val{background:linear-gradient(90deg,#fff,#cfd8e6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .kpi .val.gold,.kpi .val .gold{background:linear-gradient(90deg,#f5b23a,#e8a020);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  aside{background:linear-gradient(180deg,rgba(18,26,40,.92),rgba(13,19,30,.96));backdrop-filter:blur(14px)}
  .topbar h2{background:linear-gradient(90deg,#fff 40%,var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  /* boutons */
  .btn,.tab,.nav-item{position:relative;overflow:hidden;transform:translateZ(0)}
  .btn{transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .25s, filter .2s}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0) scale(.96)}
  .btn-gold{background:linear-gradient(135deg,#f7bc4e,#e8a020 55%,#d08e12);box-shadow:0 4px 16px rgba(232,160,32,.28)}
  .btn-gold:hover{box-shadow:0 8px 28px rgba(232,160,32,.45);filter:brightness(1.06)}
  .btn-ghost:hover{border-color:rgba(232,160,32,.45);color:var(--accent-2)}
  .btn-red:hover{box-shadow:0 6px 20px rgba(255,92,92,.25)}
  .rip{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.35),rgba(255,255,255,.12) 60%,transparent);transform:scale(0);animation:rip .6s ease-out forwards;pointer-events:none}
  @keyframes rip{to{transform:scale(2.8);opacity:0}}

  /* navigation */
  .nav-item{transition:all .22s cubic-bezier(.2,.7,.3,1)}
  .nav-item:hover{transform:translateX(4px)}
  .nav-item.active{box-shadow:inset 3px 0 0 var(--accent), 0 4px 18px rgba(232,160,32,.10)}
  .tab{transition:all .2s cubic-bezier(.2,.7,.3,1)}
  .tab:hover{transform:translateY(-2px);border-color:rgba(232,160,32,.3)}
  .tab.on{box-shadow:0 6px 20px rgba(232,160,32,.15)}

  /* champs */
  input.field:focus,select.field:focus,.login-card input:focus,.sheet input:focus{box-shadow:0 0 0 3px rgba(232,160,32,.15)}

  /* entrées en cascade */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes rise{from{opacity:0;transform:translateY(34px)}to{opacity:1;transform:none}}
    @keyframes growX{from{transform:scaleX(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(232,160,32,.18)}50%{box-shadow:0 0 48px rgba(232,160,32,.38)}}
    #main>*{animation:fadeUp .45s cubic-bezier(.2,.7,.3,1) both}
    #main>*:nth-child(2){animation-delay:.07s}
    #main>*:nth-child(3){animation-delay:.14s}
    #main>*:nth-child(4){animation-delay:.21s}
    .grid>.panel{animation:fadeUp .5s cubic-bezier(.2,.7,.3,1) both}
    .grid>.panel:nth-child(2){animation-delay:.08s}
    .grid>.panel:nth-child(3){animation-delay:.16s}
    .grid>.panel:nth-child(4){animation-delay:.24s}
    tbody tr{animation:fadeUp .35s cubic-bezier(.2,.7,.3,1) both}
    tbody tr:nth-child(1){animation-delay:.02s}tbody tr:nth-child(2){animation-delay:.05s}
    tbody tr:nth-child(3){animation-delay:.08s}tbody tr:nth-child(4){animation-delay:.11s}
    tbody tr:nth-child(5){animation-delay:.14s}tbody tr:nth-child(6){animation-delay:.17s}
    tbody tr:nth-child(7){animation-delay:.20s}tbody tr:nth-child(8){animation-delay:.23s}
    .prog i{transform-origin:left;animation:growX .9s cubic-bezier(.2,.7,.3,1) both}
    .pod{animation:rise .65s cubic-bezier(.2,.7,.3,1) both}
    .pod2{animation-delay:.12s}.pod3{animation-delay:.22s}
    .modal{animation:fadeUp .3s cubic-bezier(.2,.7,.3,1)}
    .login-card{animation:rise .7s cubic-bezier(.2,.7,.3,1), glowPulse 5s ease-in-out 1s infinite}
    .login-card img{animation:float 4.5s ease-in-out infinite}
    .zone-tag{transition:transform .25s}
    tr:hover .zone-tag{transform:rotate(-8deg) scale(1.15)}
  #toast{transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
  #login{background:
    radial-gradient(ellipse at 70% 20%, rgba(232,160,32,.14), transparent 55%),
    linear-gradient(160deg,rgba(11,17,27,.86),rgba(22,32,46,.90))}
  .login-card{background:linear-gradient(165deg,rgba(25,34,52,.9),rgba(15,22,35,.96));backdrop-filter:blur(16px)}

  /* ================== NÉON GTA6 ================== */
  :root{--neon-p:#ff2d95;--neon-c:#22d7ee;--neon-v:#8b5cf6}
  body{background:
    radial-gradient(ellipse at 12% -5%, rgba(139,92,246,.16), transparent 50%),
    radial-gradient(ellipse at 90% 105%, rgba(255,45,149,.12), transparent 55%),
    radial-gradient(ellipse at 60% 40%, rgba(34,215,238,.05), transparent 60%),
    var(--bg)}
  aside{border-right:1px solid rgba(255,45,149,.14)}
  .brand b{text-shadow:0 0 14px rgba(232,160,32,.85)}
  .brand small{color:var(--neon-c);text-shadow:0 0 9px rgba(34,215,238,.7)}
  .topbar h2{background:linear-gradient(90deg,#fff 10%,var(--neon-p) 55%,var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(255,45,149,.35))}
  .nav-item:hover{color:var(--neon-c)}
  .nav-item.active{color:var(--neon-p);background:linear-gradient(135deg,rgba(255,45,149,.16),rgba(139,92,246,.07));box-shadow:inset 3px 0 0 var(--neon-p), 0 4px 18px rgba(255,45,149,.14)}
  .panel{border-color:rgba(139,92,246,.16)}
  .panel:hover{border-color:rgba(255,45,149,.35);box-shadow:0 16px 44px rgba(0,0,0,.4), 0 0 26px rgba(255,45,149,.10), inset 0 1px 0 rgba(255,255,255,.06)}
  .kpi::after{background:radial-gradient(circle,rgba(255,45,149,.18),transparent 70%);animation:haloPulse 4.5s ease-in-out infinite}
  .grid .kpi:nth-child(2)::after{background:radial-gradient(circle,rgba(34,215,238,.18),transparent 70%);animation-delay:1.1s}
  .grid .kpi:nth-child(3)::after{background:radial-gradient(circle,rgba(232,160,32,.20),transparent 70%);animation-delay:2.2s}
  .grid .kpi:nth-child(4)::after{background:radial-gradient(circle,rgba(139,92,246,.20),transparent 70%);animation-delay:3.3s}
  @keyframes haloPulse{
    0%,100%{opacity:.45;transform:scale(1)}
    50%{opacity:1;transform:scale(1.8)}
  }
  .kpi .val{filter:drop-shadow(0 0 8px rgba(255,255,255,.12))}
  .kpi .val.gold,.kpi .val .gold{filter:drop-shadow(0 0 12px rgba(232,160,32,.55))}
  .btn-gold{box-shadow:0 4px 16px rgba(232,160,32,.3), 0 0 24px rgba(232,160,32,.22)}
  .btn-gold:hover{box-shadow:0 8px 28px rgba(232,160,32,.5), 0 0 34px rgba(255,45,149,.25)}
  .btn-ghost:hover{border-color:var(--neon-c);color:var(--neon-c);box-shadow:0 0 18px rgba(34,215,238,.22)}
  .tab:hover{border-color:rgba(34,215,238,.45);color:var(--neon-c)}
  .tab.on{color:var(--neon-p);border-color:rgba(255,45,149,.5);background:linear-gradient(135deg,rgba(255,45,149,.17),rgba(139,92,246,.08));box-shadow:0 6px 22px rgba(255,45,149,.2)}
  input.field:focus,select.field:focus,.login-card input:focus,.sheet input:focus{border-color:var(--neon-c);box-shadow:0 0 0 3px rgba(34,215,238,.14), 0 0 16px rgba(34,215,238,.15)}
  .prog i{background:linear-gradient(90deg,var(--neon-p),var(--accent-2))}
  .prog i.full{background:linear-gradient(90deg,#2eb872,var(--green));box-shadow:0 0 10px rgba(61,220,132,.5)}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--neon-p),var(--neon-v))}
  .login-card{border-color:rgba(255,45,149,.25)}
  .login-card h1 b{text-shadow:0 0 16px rgba(232,160,32,.85)}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(255,45,149,.14)}50%{box-shadow:0 0 56px rgba(139,92,246,.4)}}
  #toast{border-left-color:var(--neon-p);box-shadow:0 15px 40px rgba(0,0,0,.4), 0 0 22px rgba(255,45,149,.18)}

  @media(max-width:1000px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
  @media(max-width:760px){
    aside{width:100%;height:auto;position:sticky;flex-direction:row;overflow-x:auto;padding:12px;align-items:center}
    .brand{padding:0 10px}.brand small{display:none}
    .nav-item{width:auto;white-space:nowrap;margin:0 2px}
    .nav-item .txt{display:none}
    main{margin-left:0;padding:20px}
    .g4{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <form class="login-card" onsubmit="return doLogin(event)">
    <img src="assets/logo.png" alt="Oil Roxwood" style="width:110px;height:110px;object-fit:contain">
    <h1>OIL <b>ROXWOOD</b></h1>
    <p>Espace administrateur — accès restreint</p>
    <input type="password" id="pw" placeholder="Mot de passe" autofocus autocomplete="current-password">
    <button type="submit">Se connecter</button>
    <div id="loginErr">Mot de passe incorrect.</div>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <aside>
    <div class="brand"><img src="assets/logo.png" alt="" width="32" height="32" style="object-fit:contain"> <span>OIL <b>ROXWOOD</b><small>DASHBOARD ADMIN</small></span></div>
    <button class="nav-item active" data-view="overview">📊 <span class="txt">Vue d'ensemble</span></button>
    <button class="nav-item" data-view="effectif">👥 <span class="txt">Effectif</span></button>
    <button class="nav-item" data-view="runs">🚛 <span class="txt">Runs</span></button>
    <button class="nav-item" data-view="semaine">💰 <span class="txt">Semaine &amp; Primes</span></button>
    <button class="nav-item" data-view="zones">🗺️ <span class="txt">Zones</span></button>
    <button class="nav-item" data-view="feuilles">📋 <span class="txt">Feuilles</span></button>
    <button class="nav-item" data-view="factures">🧾 <span class="txt">Factures</span></button>
    <button class="nav-item" data-view="relances">📞 <span class="txt">Relances</span></button>
    <button class="nav-item" data-view="bilan">🏦 <span class="txt">Bilan compta</span></button>
    <button class="nav-item" data-view="dlogs">📡 <span class="txt">Logs Discord</span></button>
    <button class="nav-item" data-view="params">⚙️ <span class="txt">Paramètres</span></button>
    <div class="spacer"></div>
    <button class="nav-item" id="logout" onclick="logout()">⏻ <span class="txt">Déconnexion</span></button>
  </aside>
  <main id="main"></main>
</div>

<div id="printZone"></div>
<div id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>

<script>
/* ================== CONSTANTES ================== */
const GRADES = [
  {nom:'Intérimaire',        quota:3000, mult:1,   montee:3000,  cls:'bg0'},
  {nom:'Raffineur',          quota:3000, mult:1.5, montee:5000,  cls:'bg1'},
  {nom:'Raffineur Confirmé', quota:5000, mult:2,   montee:8000,  cls:'bg2'},
  {nom:'Raffineur Expert',   quota:6500, mult:2.5, montee:10000, cls:'bg3'},
];
const ZONES = ['A','B','C','D'];
const LS_KEY = 'oilroxwood_admin_v1';
const DEFAULT_HASH = null; // défini au premier login avec le mdp par défaut

/* ================== ÉTAT ================== */
let S = load();
function defaults(){
  return {
    passHash:null,
    runners:[],
    weeks:[],
    imported:[],
    sheets:null,
    fact:null,
    settings:{prix:10, primeBase:5000, top:[15000,10000,5000], limite:24000, semaine:1,
      webhook:'https://discord.com/api/webhooks/1247564402782371985/X8pynlKA1sn26In6aONz4IO7XZl7pwtnW19yvmLKX2DiMq_LXEBZRHGW1rBgyes0h9kg'}
  };
}
function load(){
  try{ const d = JSON.parse(localStorage.getItem(LS_KEY)); return d ? Object.assign(defaults(), d) : defaults(); }
  catch(e){ return defaults(); }
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }

/* ================== AUTH ================== */
async function sha(t){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function doLogin(e){
  e.preventDefault();
  const h = await sha(document.getElementById('pw').value);
  const ok = S.passHash ? (h === S.passHash) : (document.getElementById('pw').value === 'roxwood');
  if(ok){
    if(!S.passHash){ S.passHash = await sha('roxwood'); save(); }
    sessionStorage.setItem('orx_auth','1');
    enter();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pw').value='';
  }
  return false;
}
function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  show('overview');
  // synchronise l'effectif avec la feuille tablette à chaque connexion
  setTimeout(()=>{ ensureSheets().then(()=>{ const r=syncRunners(true); if(r&&(r.added||r.removed||r.updated)) rerender(); }); }, 100);
}
function logout(){ sessionStorage.removeItem('orx_auth'); location.reload(); }
// connexion auto différée : attend que tout le script soit chargé avant d'entrer
if(sessionStorage.getItem('orx_auth')==='1') setTimeout(enter,0);

/* ================== HELPERS ================== */
const $ = s => document.querySelector(s);
const fmt = n => (n||0).toLocaleString('fr-FR');
const money = n => fmt(Math.round(n)) + ' $';
const esc = t => String(t??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600); }
/* ---- Logs Discord (webhook compte entreprise) ---- */
function sendLog(title, desc, color){
  const url=(S.settings.webhook||'').trim();
  if(!url.startsWith('https://discord.com/api/webhooks/')) return;
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    username:'Oil Roxwood — Logs',
    embeds:[{title, description:desc, color:color||0xe8a020,
      footer:{text:`Semaine ${S.settings.semaine} · Dashboard admin`},
      timestamp:new Date().toISOString()}]
  })}).catch(()=>{});
}
function grade(r){ return GRADES[r.grade]; }
function gTitle(r){ return r.poste||grade(r).nom; } // rang réel (Patron, Commercial…) ou grade raffineur
function gCls(r){ return r.poste?(/patron/i.test(r.poste)?'bg3':'bg2'):grade(r).cls; }
function quotaOK(r){ return r.barils >= grade(r).quota; }
function primeProj(r){ return quotaOK(r) ? S.settings.primeBase * grade(r).mult : 0; }
function eligible(r){ return r.grade < 3 && r.total >= grade(r).montee; }
let charts = [];
function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }
function mkChart(id, cfg){
  const el = document.getElementById(id); if(!el || typeof Chart==='undefined') return;
  Chart.defaults.color = '#8494a9'; Chart.defaults.borderColor = 'rgba(255,255,255,.06)';
  Chart.defaults.font.family = "'Segoe UI',system-ui,sans-serif";
  charts.push(new Chart(el, cfg));
}

/* ================== NAVIGATION ================== */
document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.onclick=()=>show(b.dataset.view));
let VIEW='overview';
function show(v){
  VIEW=v;
  document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  destroyCharts();
  ({overview,effectif,runs,semaine,zones,feuilles,factures,relances,bilan,dlogs,params})[v]();
}
function rerender(){ show(VIEW); }

/* ================== VUE D'ENSEMBLE ================== */
function overview(){
  const R=S.runners, tot=R.reduce((a,r)=>a+r.barils,0), ok=R.filter(quotaOK).length;
  const sorted=[...R].sort((a,b)=>b.barils-a.barils);
  const lastW = S.weeks[S.weeks.length-1];
  $('#main').innerHTML = `
  <div class="topbar">
    <div><h2>Vue d'ensemble</h2><div class="sub">Semaine ${S.settings.semaine} · ${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div></div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="chip">🛢️ Prix : <b>${S.settings.prix} $/u</b></span>
      <span class="chip">🎯 Limite : <b>${fmt(S.settings.limite)}</b></span>
      <button class="btn btn-gold" onclick="publishStats()">📊 Publier sur le site</button>
    </div>
  </div>
  <div class="grid g4" style="margin-bottom:18px">
    <div class="panel kpi"><div class="lbl">Effectif</div><div class="val">${R.length}</div><div class="delta">${R.filter(r=>r.grade===3).length} expert(s)</div></div>
    <div class="panel kpi"><div class="lbl">Barils · semaine</div><div class="val">${fmt(tot)}</div><div class="delta">${lastW?`sem. préc. : ${fmt(lastW.total)}`:'première semaine'}</div></div>
    <div class="panel kpi"><div class="lbl">Chiffre d'affaires</div><div class="val gold">${money(tot*S.settings.prix)}</div><div class="delta">à ${S.settings.prix} $/unité</div></div>
    <div class="panel kpi"><div class="lbl">Quotas atteints</div><div class="val ${ok===R.length&&R.length?'up':''}">${ok}<span style="font-size:1rem;color:var(--muted)">/${R.length}</span></div><div class="delta">primes projetées : ${money(R.reduce((a,r)=>a+primeProj(r),0))}</div></div>
  </div>
  <div class="grid g2" style="margin-bottom:18px">
    <div class="panel"><h3>Barils par runner (semaine)</h3>${R.length?'<canvas id="cRunners" height="230"></canvas>':'<div class="empty">Aucun runner — ajoute ton effectif 👥</div>'}</div>
    <div class="panel"><h3>Production par zone</h3>${R.length?'<canvas id="cZones" height="230"></canvas>':'<div class="empty">—</div>'}</div>
  </div>
  <div class="grid g2">
    <div class="panel"><h3>Historique des semaines</h3>${S.weeks.length?'<canvas id="cWeeks" height="220"></canvas>':'<div class="empty">Aucune semaine clôturée pour le moment</div>'}</div>
    <div class="panel"><h3>🏆 TOP 3 en direct</h3>${top3html(sorted)}</div>
  </div>`;
  if(R.length){
    mkChart('cRunners',{type:'bar',data:{labels:sorted.map(r=>r.nom),datasets:[{data:sorted.map(r=>r.barils),backgroundColor:sorted.map((r,i)=>i===0?'#e8a020':i===1?'#a8b6c8':i===2?'#c07840':'rgba(90,160,255,.55)'),borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
    const zd=ZONES.map(z=>R.filter(r=>r.zone===z).reduce((a,r)=>a+r.barils,0));
    mkChart('cZones',{type:'doughnut',data:{labels:ZONES.map(z=>'Zone '+z),datasets:[{data:zd,backgroundColor:['#e8a020','#5aa0ff','#3ddc84','#a78bfa'],borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{position:'bottom'}}}});
  }
  if(S.weeks.length){
    mkChart('cWeeks',{type:'line',data:{labels:S.weeks.map(w=>'S'+w.num),datasets:[{label:'Barils',data:S.weeks.map(w=>w.total),borderColor:'#e8a020',backgroundColor:'rgba(232,160,32,.12)',fill:true,tension:.35,pointBackgroundColor:'#e8a020'}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  }
}
function top3html(sorted){
  const t=sorted.slice(0,3);
  if(!t.length) return '<div class="empty">Aucune donnée</div>';
  const p=(r,i)=>r?`<div class="pod pod${i}"><div style="font-size:1.3rem">${['🥇','🥈','🥉'][i-1]}</div><div class="name">${esc(r.nom)}</div><div class="amt">${fmt(r.barils)} barils · prime ${money(S.settings.top[i-1])}</div></div>`:'<div class="pod" style="min-height:60px"></div>';
  return `<div class="podium">${p(t[1],2)}${p(t[0],1)}${p(t[2],3)}</div>`;
}

/* ================== EFFECTIF ================== */
let filterG=-1, filterZ='', search='';
function effectif(){
  let R=[...S.runners].sort((a,b)=>b.grade-a.grade||b.barils-a.barils);
  if(String(filterG)!=='-1'){
    if(String(filterG).startsWith('p:')) R=R.filter(r=>r.poste===String(filterG).slice(2));
    else R=R.filter(r=>r.grade===+filterG&&!r.poste);
  }
  if(filterZ) R=R.filter(r=>r.zone===filterZ);
  if(search) R=R.filter(r=>(r.nom+' '+r.discord).toLowerCase().includes(search.toLowerCase()));
  $('#main').innerHTML = `
  <div class="topbar">
    <div><h2>Effectif</h2><div class="sub">${S.runners.length} runner(s) · ${S.runners.filter(eligible).length} montée(s) de grade en attente · synchronisé avec la feuille Tablette</div></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="ensureSheets().then(()=>{syncRunners(false);effectif();})">🔄 Sync tablette</button>
      <button class="btn btn-gold" onclick="openRunnerModal()">＋ Ajouter un runner</button>
    </div>
  </div>
  <div class="panel" style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <input class="field" style="max-width:220px" placeholder="🔍 Rechercher…" value="${esc(search)}" oninput="search=this.value;effectif()">
    <select class="field" style="max-width:200px" onchange="filterG=this.value;effectif()">
      <option value="-1">Tous les grades</option>
      ${GRADES.map((g,i)=>`<option value="${i}" ${String(filterG)===String(i)?'selected':''}>${g.nom}</option>`).join('')}
      ${[...new Set(S.runners.filter(r=>r.poste).map(r=>r.poste))].sort().map(p=>`<option value="p:${esc(p)}" ${String(filterG)==='p:'+p?'selected':''}>💼 ${esc(p)}</option>`).join('')}
    </select>
    <select class="field" style="max-width:160px" onchange="filterZ=this.value;effectif()">
      <option value="">Toutes zones</option>
      ${ZONES.map(z=>`<option ${filterZ===z?'selected':''}>${z}</option>`).join('')}
    </select>
  </div>
  <div class="panel" style="padding:8px 16px">
    ${R.length?`<table>
      <thead><tr><th>Runner</th><th>Grade</th><th>Zone</th><th>Quota semaine</th><th>Total barils</th><th style="text-align:right">Actions</th></tr></thead>
      <tbody>${R.map(rowRunner).join('')}</tbody>
    </table>`:'<div class="empty">Aucun runner trouvé</div>'}
  </div>`;
}
function rowRunner(r){
  const g=grade(r), pc=Math.min(100,Math.round(r.barils/g.quota*100));
  return `<tr>
    <td><b>${esc(r.nom)}</b><div style="color:var(--muted);font-size:.76rem">@${esc(r.discord)}</div></td>
    <td><span class="badge ${gCls(r)}">${esc(gTitle(r))}</span>${!r.poste&&eligible(r)?`<span class="promo-flag">▲ Montée dispo (${fmt(grade(r).montee)} barils)</span>`:''}</td>
    <td><span class="zone-tag z${r.zone}">${r.zone}</span></td>
    <td><div class="prog"><i class="${pc>=100?'full':''}" style="width:${pc}%"></i></div><div class="pct">${fmt(r.barils)} / ${fmt(g.quota)} (${pc}%)</div></td>
    <td>${fmt(r.total)}</td>
    <td style="text-align:right;white-space:nowrap">
      ${eligible(r)?`<button class="btn btn-sm btn-gold" onclick="promote(${r.id})" title="Monter de grade">▲</button>`:''}
      <button class="btn btn-sm btn-ghost" onclick="openRunnerModal(${r.id})">✎</button>
      <button class="btn btn-sm btn-red" onclick="delRunner(${r.id})">✕</button>
    </td>
  </tr>`;
}
function openRunnerModal(id){
  const r = S.runners.find(x=>x.id===id) || {nom:'',discord:'',grade:0,zone:suggestZone()};
  openModal(`
    <h3>${id?'Modifier':'Nouveau'} runner</h3>
    <div class="f-row"><label class="f-lbl">Nom RP</label><input class="field" id="m_nom" value="${esc(r.nom)}" placeholder="John Baker"></div>
    <div class="f-row"><label class="f-lbl">Discord</label><input class="field" id="m_dc" value="${esc(r.discord)}" placeholder="john_baker"></div>
    <div class="grid g2">
      <div class="f-row"><label class="f-lbl">Grade</label><select class="field" id="m_gr">${GRADES.map((g,i)=>`<option value="${i}" ${r.grade===i?'selected':''}>${g.nom}</option>`).join('')}</select></div>
      <div class="f-row"><label class="f-lbl">Zone</label><select class="field" id="m_zn">${ZONES.map(z=>`<option ${r.zone===z?'selected':''}>${z}</option>`).join('')}</select></div>
    </div>
    <button class="btn btn-gold" style="width:100%;margin-top:8px" onclick="saveRunner(${id||0})">Enregistrer</button>`);
}
function suggestZone(){
  const c=ZONES.map(z=>S.runners.filter(r=>r.zone===z).length);
  return ZONES[c.indexOf(Math.min(...c))];
}
function saveRunner(id){
  const nom=$('#m_nom').value.trim(), dc=$('#m_dc').value.trim();
  if(!nom) return toast('⚠️ Le nom est requis');
  if(id){
    const r=S.runners.find(x=>x.id===id);
    Object.assign(r,{nom,discord:dc,grade:+$('#m_gr').value,zone:$('#m_zn').value});
  } else {
    S.runners.push({id:Date.now(),nom,discord:dc,grade:+$('#m_gr').value,zone:$('#m_zn').value,barils:0,total:0,runs:[]});
    sendLog('👥 Nouvelle recrue', `**${nom}** (@${dc}) rejoint l'entreprise — ${GRADES[+$('#m_gr').value].nom}, zone ${$('#m_zn').value}`, 0x3ddc84);
  }
  save(); closeModal(); rerender(); toast('✅ Runner enregistré');
}
function promote(id){
  const r=S.runners.find(x=>x.id===id);
  if(r.grade<3){ r.grade++; save(); rerender(); sendLog('🎉 Montée de grade', `**${r.nom}** passe **${GRADES[r.grade].nom}** !`, 0xe8a020); toast(`🎉 ${r.nom} passe ${GRADES[r.grade].nom} !`); }
}
function delRunner(id){
  const r=S.runners.find(x=>x.id===id);
  if(confirm(`Supprimer ${r.nom} de l'effectif ?`)){ S.runners=S.runners.filter(x=>x.id!==id); save(); rerender(); sendLog('🚪 Départ', `**${r.nom}** quitte l'effectif`, 0xff5c5c); toast('Runner supprimé'); }
}

/* ================== RUNS ================== */
function runs(){
  const all=S.runners.flatMap(r=>r.runs.map(x=>({...x,nom:r.nom,rid:r.id}))).sort((a,b)=>b.t-a.t).slice(0,25);
  const over=S.runners.filter(r=>r.barils>=S.settings.limite);
  $('#main').innerHTML = `
  <div class="topbar"><div><h2>Runs</h2><div class="sub">Saisie des barils livrés</div></div></div>
  ${over.length?`<div class="warn">⚠️ Limite de ${fmt(S.settings.limite)} pétroles atteinte pour : ${over.map(r=>esc(r.nom)).join(', ')}</div>`:''}
  <div class="grid g2">
    <div class="panel">
      <h3>➕ Enregistrer un run</h3>
      ${S.runners.length?`
      <div class="f-row"><label class="f-lbl">Runner</label><select class="field" id="run_r">${[...S.runners].sort((a,b)=>a.nom.localeCompare(b.nom)).map(r=>`<option value="${r.id}">${esc(r.nom)} — ${esc(gTitle(r))}</option>`).join('')}</select></div>
      <div class="f-row"><label class="f-lbl">Barils livrés</label><input class="field" id="run_b" type="number" min="1" placeholder="Ex : 500"></div>

      <p style="color:var(--muted);font-size:.78rem;margin-top:12px">💡 CA généré = barils × ${S.settings.prix} $ · le quota et le total du runner sont mis à jour automatiquement.</p>
      `:'<div class="empty">Ajoute d\'abord des runners dans l\'effectif</div>'}

        ${all.map(x=>`<tr><td><b>${esc(x.nom)}</b></td><td>${fmt(x.b)}</td><td class="gold">${money(x.b*S.settings.prix)}</td><td style="color:var(--muted);font-size:.78rem">${new Date(x.t).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td><button class="btn btn-sm btn-red" onclick="delRun(${x.rid},${x.t})" title="Annuler">✕</button></td></tr>`).join('')}
      </tbody></table>`:'<div class="empty">Aucun run enregistré cette semaine</div>'}

function addRun(){
  const r=S.runners.find(x=>x.id===+$('#run_r').value), b=+$('#run_b').value;
  if(!b||b<1) return toast('⚠️ Nombre de barils invalide');
  r.runs.push({t:Date.now(),b}); r.barils+=b; r.total+=b;
  save(); rerender();
  sendLog('🚛 Run enregistré', `**${r.nom}** a livré **${fmt(b)} barils** (CA ${money(b*S.settings.prix)})\nSemaine : ${fmt(r.barils)}/${fmt(grade(r).quota)}${quotaOK(r)?' — 🎯 quota atteint !':''}`, 0x5aa0ff);
  toast(quotaOK(r)?`✅ ${r.nom} : +${fmt(b)} barils — quota atteint ! 🎯`:`✅ ${r.nom} : +${fmt(b)} barils`);
}
function delRun(rid,t){
  const r=S.runners.find(x=>x.id===rid), i=r.runs.findIndex(x=>x.t===t);
  if(i>-1){ const b=r.runs[i].b; r.barils-=b; r.total-=b; r.runs.splice(i,1); save(); rerender(); sendLog('↩️ Run annulé', `**${r.nom}** : -${fmt(b)} barils`, 0xff5c5c); toast('Run annulé'); }
}

/* ================== SEMAINE & PRIMES ================== */
function semaine(){
  const R=[...S.runners].sort((a,b)=>b.barils-a.barils);
  const totalPrimes = R.reduce((a,r)=>a+primeProj(r),0) + S.settings.top.slice(0,Math.min(3,R.length)).reduce((a,b)=>a+b,0);
  $('#main').innerHTML = `
  <div class="topbar">
    <div><h2>Semaine ${S.settings.semaine} — Primes</h2><div class="sub">Prime de base : ${money(S.settings.primeBase)} (montant minimum, versée le lundi si quota effectué)</div></div>
    <button class="btn btn-gold" onclick="closeWeek()">🗓️ Clôturer la semaine (lundi)</button>
  </div>
  <div class="panel" style="margin-bottom:18px;padding:8px 16px">
    ${R.length?`<table><thead><tr><th>#</th><th>Runner</th><th>Grade</th><th>Barils</th><th>Quota</th><th>Multiplicateur</th><th>Prime projetée</th></tr></thead><tbody>
    ${R.map((r,i)=>{const g=grade(r),okk=quotaOK(r);return `<tr>
      <td>${i<3?['🥇','🥈','🥉'][i]:i+1}</td>
      <td><b>${esc(r.nom)}</b></td>
      <td><span class="badge ${gCls(r)}">${esc(gTitle(r))}</span></td>
      <td>${fmt(r.barils)}</td>
      <td>${okk?'<span class="up">✔ atteint</span>':`<span class="down">${fmt(g.quota-r.barils)} restants</span>`}</td>
      <td>×${g.mult}</td>
      <td class="${okk?'gold':''}" style="font-weight:700">${okk?money(primeProj(r)+(i<3?S.settings.top[i]:0)):'—'}${okk&&i<3?`<div style="font-size:.7rem;color:var(--muted)">dont TOP ${i+1} : ${money(S.settings.top[i])}</div>`:''}</td>
    </tr>`}).join('')}
    </tbody></table>`:'<div class="empty">Aucun runner</div>'}
  </div>
  <div class="grid g2">
    <div class="panel kpi"><div class="lbl">Total primes projetées</div><div class="val gold">${money(totalPrimes)}</div><div class="delta">si tous les quotas restent en l'état</div></div>
    <div class="panel">
      <h3>🗃️ Semaines clôturées</h3>
      ${S.weeks.length?`<table><thead><tr><th>Semaine</th><th>Barils</th><th>Primes versées</th><th>🥇 Vainqueur</th></tr></thead><tbody>
      ${[...S.weeks].reverse().map(w=>`<tr><td><b>S${w.num}</b> <span style="color:var(--muted);font-size:.75rem">${w.date}</span></td><td>${fmt(w.total)}</td><td class="gold">${money(w.primes)}</td><td>${esc(w.winner||'—')}</td></tr>`).join('')}
      </tbody></table>`:'<div class="empty">Aucune clôture pour le moment</div>'}
    </div>
  </div>`;
}
function closeWeek(){
  if(!S.runners.length) return toast('Aucun runner à clôturer');
  if(!confirm(`Clôturer la semaine ${S.settings.semaine} ?\n\n• Les primes sont figées (quota + TOP 3)\n• Les compteurs hebdo repartent à zéro\n• Les montées de grade éligibles sont appliquées`)) return;
  const sorted=[...S.runners].sort((a,b)=>b.barils-a.barils);
  let primes=0, promus=[];
  sorted.forEach((r,i)=>{
    if(quotaOK(r)) primes+=primeProj(r);
    if(i<3 && r.barils>0) primes+=S.settings.top[i];
  });
  S.runners.forEach(r=>{ if(eligible(r)){ r.grade++; promus.push(r.nom); } });
  S.weeks.push({num:S.settings.semaine, date:new Date().toLocaleDateString('fr-FR'), total:sorted.reduce((a,r)=>a+r.barils,0), primes, winner:sorted[0]?.barils>0?sorted[0].nom:null});
  const w=S.weeks[S.weeks.length-1];
  const podium=sorted.slice(0,3).filter(r=>r.barils>0).map((r,i)=>`${['🥇','🥈','🥉'][i]} **${r.nom}** — ${fmt(r.barils)} barils (+${money(S.settings.top[i])})`).join('\n');
  sendLog(`🗓️ Clôture de la semaine ${w.num}`,
    `**Production totale : ${fmt(w.total)} barils** (CA ${money(w.total*S.settings.prix)})\n**Primes versées : ${money(primes)}**\n\n${podium||'_Aucun run cette semaine_'}${promus.length?`\n\n📈 Promotions : ${promus.map(n=>'**'+n+'**').join(', ')}`:''}`, 0xe8a020);
  S.runners.forEach(r=>{ r.barils=0; r.runs=[]; });
  S.settings.semaine++;
  save(); rerender();
  toast(`🗓️ Semaine clôturée — ${money(primes)} de primes${promus.length?` · promus : ${promus.join(', ')}`:''}`);
}

/* ================== PUBLICATION DES STATS PUBLIQUES ================== */
async function publishStats(){
  const token=(localStorage.getItem('orx_gh')||'').trim();
  if(!token){ toast('⚠️ Ajoute d\'abord un token GitHub dans Paramètres'); return; }
  const sorted=[...S.runners].sort((a,b)=>b.barils-a.barils);
  const data={
    maj:new Date().toISOString(), semaine:S.settings.semaine,
    totalBarils:S.runners.reduce((a,r)=>a+r.barils,0),
    ca:S.runners.reduce((a,r)=>a+r.barils,0)*S.settings.prix,
    effectif:S.runners.length,
    clientsServis:(S.fact&&S.fact.factures.length)||0,
    top3:sorted.slice(0,3).filter(r=>r.barils>0).map(r=>({nom:r.nom,barils:r.barils})),
    runners:S.runners.map(r=>({nom:r.nom,grade:r.grade,poste:r.poste||null,barils:r.barils,total:r.total,quota:GRADES[r.grade].quota,prime:primeProj(r)}))
  };
  const api='https://api.github.com/repos/Poloveni/OilRoxwood/contents/data/stats-public.json';
  const hdr={Authorization:'Bearer '+token,Accept:'application/vnd.github+json'};
  toast('📡 Publication en cours…');
  try{
    let sha;
    const g=await fetch(api,{headers:hdr});
    if(g.ok) sha=(await g.json()).sha;
    const body={message:'📊 Publication des stats publiques',
      content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,1))))};
    if(sha) body.sha=sha;
    const r=await fetch(api,{method:'PUT',headers:hdr,body:JSON.stringify(body)});
    if(r.ok){ toast('✅ Stats publiées ! Visibles sur le site dans ~1 min'); sendLog('📊 Stats publiées','Le site public affiche maintenant la semaine '+S.settings.semaine,0x3ddc84); }
    else{ const e=await r.json().catch(()=>({})); toast('⚠️ Échec ('+(e.message||r.status)+') — vérifie le token'); }
  }catch(e){ toast('⚠️ Erreur réseau pendant la publication'); }
}

  const head=def.cols.map(c=>`<th ${c.t==='num'||c.t==='calc'?'style="text-align:right"':''}>${c.l}</th>`).join('');
  const body=idx.map(i=>{
    const r=rows[i];
    const tds=def.cols.map(c=>{
      if(c.t==='calc') return `<td class="calc">${fmt(Math.round(c.f(r)))}</td>`;
      if(c.t==='bool') return `<td style="text-align:center"><input type="checkbox" ${r[c.k]?'checked':''} onchange="cellEdit(${i},'${c.k}',this.checked)"></td>`;
      if(c.t==='num')  return `<td><input type="number" value="${nn(r[c.k])}" onchange="cellEdit(${i},'${c.k}',+this.value||0)"></td>`;

    }).join('');
    return `<tr>${tds}<td style="text-align:right"><button class="btn btn-sm btn-red" onclick="rowDel(${i})">✕</button></td></tr>`;
  }).join('');
  const foot=def.tot.length?`<tfoot><tr><td>Total (${idx.length} lignes)</td>${def.cols.slice(1).map(c=>{

/* ---- Synchronisation Tablette → Effectif runners ---- */
function syncRunners(silent){
  if(!S.sheets||!S.sheets.tablette) return;
  const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
  const MAP={'interimaire':0,'raffineur':1,'raffineur confirme':2,'raffineur expert':3};
  let added=0, updated=0, removed=0;
  const present=new Set();
  S.sheets.tablette.forEach(row=>{
    const nom=String(row.nom||'').trim();
    if(!nom||norm(nom).startsWith('nom')) return; // ignore lignes d'en-tête
    const known=MAP[norm(row.rang)];
    const g=known!==undefined?known:0; // hors grades raffineur : quota Intérimaire
    const rang=String(row.rang||'').trim();
    const poste=(known===undefined&&rang&&rang!=='-')?rang:null; // Patron, Commercial, RH…
    present.add(nom.toLowerCase());
    const r=S.runners.find(x=>x.nom.toLowerCase()===nom.toLowerCase());
    if(r){ if(r.grade!==g&&r.src==='tablette'){ r.grade=g; updated++; } r.src='tablette'; r.poste=poste; }
    else{
      S.runners.push({id:Date.now()+Math.floor(Math.random()*1e6),nom,discord:'',grade:g,
        zone:suggestZone(),barils:0,total:0,runs:[],src:'tablette',poste});
      added++;
    }
  });
  // retire uniquement les runners issus de la tablette qui n'y figurent plus
  for(let i=S.runners.length-1;i>=0;i--){
    const r=S.runners[i];
    if(r.src==='tablette'&&!present.has(r.nom.toLowerCase())){ S.runners.splice(i,1); removed++; }
  }
  if(added||updated||removed){
    save();
    const msg=`🔄 Effectif synchronisé avec la tablette : ${added?'+'+added+' runner(s) ':''}${updated?updated+' grade(s) ajusté(s) ':''}${removed?'-'+removed+' départ(s)':''}`.trim();
    if(!silent){ toast(msg); sendLog('🔄 Sync tablette → effectif', msg.replace('🔄 ',''), 0x22d7ee); }
  }
  return {added,updated,removed};
}

function ligneCalc(l){
  const pu = l.pu!==undefined && l.pu!==null ? nn(l.pu) : (art(l.ref)?art(l.ref).prix:0);
  const ht = nn(l.qte)*pu;
  return {pu, ht, ttc: ht*(1+nn(l.tva)), desc: l.desc!==undefined?l.desc:(art(l.ref)?art(l.ref).desc:'')};

function offertQte(){ return 0; }

  const off=f?f.offert:offertQte();
  const qte=(f||FD).lignes.reduce((a,l)=>a+nn(l.qte),0)+off;
  return {ht:ls.reduce((a,x)=>a+x.ht,0), ttc:ls.reduce((a,x)=>a+x.ttc,0), qte, poids:qte*2, off};
}

function hlMatch(nom,q){

function cliFilter(q){

let cliJustPicked=false;
function cliPick(i){ if(cliMatches[i]){ cliJustPicked=true; FD.client=cliMatches[i].nom; fNew(); } }
function cliBlur(val){
  setTimeout(()=>{
    const l=document.getElementById('cliList'); if(l) l.classList.remove('open');
    if(cliJustPicked){ cliJustPicked=false; return; } // une sélection vient d'être faite : on n'écrase pas
    if(FD.client!==val){ FD.client=val; fNew(); }     // saisie manuelle (client hors base)
  },160);

function cliKey(e){
  const list=document.getElementById('cliList');
  if(!list||!list.classList.contains('open')) return;
  const items=[...list.querySelectorAll('.combo-item')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    cliIdx=Math.max(0,Math.min(cliMatches.length-1,cliIdx+(e.key==='ArrowDown'?1:-1)));
    items.forEach((el,i)=>el.classList.toggle('sel',i===cliIdx));
    if(items[cliIdx]) items[cliIdx].scrollIntoView({block:'nearest'});
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(cliIdx>-1) cliPick(cliIdx);
    else{ FD.client=e.target.value; fNew(); }
  }else if(e.key==='Escape'){ list.classList.remove('open'); }
}

/* ================== BILAN COMPTABLE ================== */
const CAPS={emp:{sal:85000,prime:42500}, patron:{sal:90000,prime:45000}};
function bilanData(){
  const T=S.sheets.tablette||[], SAL=S.sheets.salaires||[], CPT=S.sheets.compta||[];
  const low=s=>String(s||'').toLowerCase().trim();
  const isPatron=r=>/patron/i.test(r.rang||'');
  const lignes=T.filter(r=>r.nom&&!low(r.nom).startsWith('nom')).map(r=>{
    const s=SAL.find(x=>low(x.nom)===low(r.nom))||{};
    const cap=isPatron(r)?CAPS.patron:CAPS.emp;
    const sal=Math.min(nn(s.prodBidons)+nn(s.poste)+nn(s.remboursement)+nn(s.recrutement),cap.sal);
    const prime=Math.min(nn(s.run),cap.prime);
    return {nom:r.nom,rang:r.rang,run:nn(r.runs),facture:nn(r.factures),vente:nn(r.ventes),
      ca:nn(r.runs)+nn(r.factures)+nn(r.ventes),sal,prime};
  });
  const caBrut=lignes.reduce((a,l)=>a+l.ca,0);
  const masseSal=lignes.reduce((a,l)=>a+l.sal,0);
  const totalPrimes=lignes.reduce((a,l)=>a+l.prime,0);
  const depDed=CPT.filter(c=>/d[ée]pense/i.test(c.type)).reduce((a,c)=>a+nn(c.montant),0);
  const retraits=CPT.filter(c=>/retrait/i.test(c.type)).reduce((a,c)=>a+nn(c.montant),0);
  // méthode compta FBFA : impôt sur (CA − salaires − dépenses), primes déduites APRÈS impôt
  const depenses=masseSal+depDed;
  const benefice=caBrut-depenses;
  const taux=S.settings.impot??0.29;
  const impots=Math.max(0,benefice*taux);
  const apresImpot=benefice-impots;
  const apresPrimes=apresImpot-totalPrimes;
  return {lignes,caBrut,masseSal,totalPrimes,depDed,retraits,depenses,benefice,taux,impots,apresImpot,apresPrimes,net:apresPrimes-retraits};
}

function importLog(id, qte){
  const rid = +document.getElementById('sel_'+id).value;
  const r = S.runners.find(x=>x.id===rid);
  if(!r) return;
  r.runs.push({t:Date.now(),b:qte}); r.barils+=qte; r.total+=qte;
  S.imported.push(id); save(); dlogs();
  toast(`⬇ ${r.nom} : +${fmt(qte)} barils importés depuis Discord`);
}
function importAll(){
  const d = window._dlogsData; if(!d) return;
  const match = n => n ? S.runners.find(r => r.nom.toLowerCase()===n.toLowerCase() || r.discord.toLowerCase()===n.toLowerCase() || n.toLowerCase().includes(r.nom.toLowerCase())) : null;
  let n=0;
  d.messages.forEach(m=>{
    if(!m.quantite || S.imported.includes(m.id)) return;
    const r = match(m.nom); if(!r) return;
    r.runs.push({t:Date.now(),b:m.quantite}); r.barils+=m.quantite; r.total+=m.quantite;
    S.imported.push(m.id); n++;
  });
  save(); dlogs(); toast(`⬇ ${n} run(s) importé(s) depuis les logs Discord`);
}

  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`oilroxwood_S${S.settings.semaine}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('⬇️ Export téléchargé');
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const d=JSON.parse(rd.result);
    if(!d.runners||!d.settings) throw 0;
    S=Object.assign(defaults(),d); save(); rerender(); toast('⬆️ Données importées');
  }catch(e){ toast('⚠️ Fichier invalide'); } };
  rd.readAsText(f); inp.value='';
}
function resetAll(){
  if(confirm('Tout effacer ? (runners, semaines, paramètres)') && confirm('Vraiment sûr ? Cette action est définitive.')){
    const h=S.passHash; S=defaults(); S.passHash=h; save(); rerender(); toast('Données réinitialisées');
  }
}

/* ================== UI PREMIUM : canvas, ripple, compteurs ================== */
const MOTION_OK = true; // animations toujours actives (demande du patron 😄)

/* ---- fond animé : particules d'or noir reliées ---- */
(function(){
  if(!MOTION_OK) return;
  const cv=document.createElement('canvas'); cv.id='bgCanvas'; document.body.prepend(cv);
  const cx=cv.getContext('2d'); let W,H,PS=[];
  function rs(){
    W=cv.width=innerWidth; H=cv.height=innerHeight;
    const N=Math.min(95, Math.floor(innerWidth/16));
    const COLS=['232,160,32','232,160,32','255,45,149','34,215,238','139,92,246'];
    if(PS.length!==N) PS=Array.from({length:N},()=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.45, vy:(Math.random()-.5)*.45,
      r:Math.random()*2.2+.8, o:Math.random()*.5+.4,
      tw:Math.random()*6.28, ts:.008+Math.random()*.02,
      c:COLS[Math.floor(Math.random()*COLS.length)]
    }));
  }
  addEventListener('resize',rs); rs();
  const LINK=145, MOUSE=190;
  const M={x:-9999,y:-9999};
  addEventListener('pointermove',e=>{M.x=e.clientX;M.y=e.clientY});
  addEventListener('pointerleave',()=>{M.x=M.y=-9999});
  (function tick(){
    requestAnimationFrame(tick);
    if(document.hidden) return;
    cx.clearRect(0,0,W,H);
    for(const p of PS){
      p.x+=p.vx; p.y+=p.vy; p.tw+=p.ts;
      if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
      if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;
      const glow=(Math.sin(p.tw)+1)/2;
      cx.shadowColor=`rgba(${p.c},.9)`; cx.shadowBlur=8+glow*8;
      cx.beginPath(); cx.arc(p.x,p.y,p.r,0,6.2832);
      cx.fillStyle=`rgba(${p.c},${(p.o*(.45+.55*glow)).toFixed(3)})`;
      cx.fill();
    }
    cx.shadowBlur=0;
    for(let i=0;i<PS.length;i++)for(let j=i+1;j<PS.length;j++){
      const a=PS[i],b=PS[j],dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
      if(d2<LINK*LINK){
        cx.strokeStyle=`rgba(${a.c},${((1-Math.sqrt(d2)/LINK)*.13).toFixed(3)})`;
        cx.lineWidth=1; cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y); cx.stroke();
      }
    }
    /* halo interactif : les particules proches du curseur se relient à lui */
    for(const p of PS){
      const dx=p.x-M.x, dy=p.y-M.y, d2=dx*dx+dy*dy;
      if(d2<MOUSE*MOUSE){
        const t=1-Math.sqrt(d2)/MOUSE;
        cx.strokeStyle=`rgba(34,215,238,${(t*.30).toFixed(3)})`;
        cx.lineWidth=1.2; cx.beginPath(); cx.moveTo(p.x,p.y); cx.lineTo(M.x,M.y); cx.stroke();
        p.vx+=dx/18000; p.vy+=dy/18000;
      }
      const sp=Math.hypot(p.vx,p.vy);
      if(sp>.9){p.vx*=.9/sp;p.vy*=.9/sp}
    }
  })();
})();

/* ---- effet ripple sur boutons / onglets / navigation ---- */
document.addEventListener('pointerdown',e=>{
  const b=e.target.closest('.btn,.tab,.nav-item,.login-card button');
  if(!b) return;
  const rect=b.getBoundingClientRect(), d=Math.max(rect.width,rect.height)*1.2;
  const r=document.createElement('span'); r.className='rip';
  r.style.cssText=`width:${d}px;height:${d}px;left:${e.clientX-rect.left-d/2}px;top:${e.clientY-rect.top-d/2}px`;
  b.appendChild(r); setTimeout(()=>r.remove(),650);
});

/* ---- compteurs animés sur les KPI ---- */
function animateCounters(){
  if(!MOTION_OK) return;
  document.querySelectorAll('.kpi .val').forEach(el=>{
    if(el.dataset.anim) return; el.dataset.anim='1';
    const tn=el.firstChild;
    if(!tn || tn.nodeType!==3) return;
    const m=tn.textContent.match(/^([\d\s  .,]*\d)(.*)$/);
    if(!m) return;
    const target=parseInt(m[1].replace(/[^\d]/g,''),10), suffix=m[2]||'';
    if(!isFinite(target)||target<=0||target>1e9) return;
    const t0=performance.now(), dur=850;
    (function step(t){
      const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
      tn.textContent=Math.round(target*e).toLocaleString('fr-FR')+suffix;
      if(p<1) requestAnimationFrame(step);
    })(t0);
  });
}
new MutationObserver(()=>animateCounters()).observe(document.getElementById('main'),{childList:true});
