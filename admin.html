<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oil Roxwood — Espace membre</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0b111b; --panel:#121a28; --panel-2:#182337; --line:rgba(255,255,255,.07);
    --ink:#e8edf4; --muted:#8494a9; --accent:#e8a020; --accent-2:#f5b23a;
    --green:#3ddc84; --red:#ff5c5c; --blue:#5aa0ff; --violet:#a78bfa;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}

  /* ========== LOGIN ========== */
  #login{
    position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 70% 20%, rgba(232,160,32,.12), transparent 55%),
      linear-gradient(160deg,#0b111b,#16202e);
  }
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:44px 40px;width:min(400px,90vw);text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .login-card .drop{font-size:2.6rem}
  .login-card h1{font-size:1.3rem;margin:10px 0 4px;letter-spacing:1px}
  .login-card h1 b{color:var(--accent)}
  .login-card p{color:var(--muted);font-size:.85rem;margin-bottom:24px}
  .login-card input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);font-size:1rem;text-align:center;letter-spacing:2px}
  .login-card input:focus{outline:none;border-color:var(--accent)}
  .login-card button{width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:var(--accent);color:#0b111b;font-weight:800;font-size:.95rem;transition:transform .15s}
  .login-card button:hover{transform:translateY(-2px)}
  #loginErr{color:var(--red);font-size:.83rem;margin-top:12px;display:none}

  /* ========== LAYOUT ========== */
  #app{display:none;min-height:100vh}
  aside{
    position:fixed;top:0;left:0;bottom:0;width:230px;background:var(--panel);
    border-right:1px solid var(--line);padding:26px 16px;display:flex;flex-direction:column;z-index:50
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 10px 24px;font-weight:800;letter-spacing:.5px}
  .brand img{animation:logoFloat 4s ease-in-out infinite;cursor:pointer}
  .brand img:hover{animation:logoSpin .7s cubic-bezier(.34,1.56,.64,1)}
  @keyframes logoFloat{
    0%,100%{transform:translateY(0);filter:drop-shadow(0 0 4px rgba(232,160,32,.25))}
    50%{transform:translateY(-4px);filter:drop-shadow(0 4px 10px rgba(232,160,32,.55))}
  }
  @keyframes logoSpin{to{transform:rotate(360deg) scale(1.12)}}
  .brand small{display:block;color:var(--muted);font-weight:500;font-size:.7rem;letter-spacing:1.5px}
  .brand b{color:var(--accent)}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:none;background:none;
    color:var(--muted);font-size:.92rem;font-weight:600;width:100%;text-align:left;margin-bottom:4px;transition:all .15s
  }
  .nav-item:hover{background:var(--panel-2);color:var(--ink)}
  .nav-item.active{background:linear-gradient(135deg,rgba(232,160,32,.18),rgba(232,160,32,.06));color:var(--accent)}
  aside .spacer{flex:1}
  #logout{color:var(--red)}
  main{margin-left:230px;padding:34px 38px;max-width:1250px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:14px}
  .topbar h2{font-size:1.5rem;letter-spacing:-.3px}
  .topbar .sub{color:var(--muted);font-size:.85rem;margin-top:2px}

  /* ========== COMPONENTS ========== */
  .grid{display:grid;gap:18px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
  .panel h3{font-size:.95rem;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .kpi{position:relative;overflow:hidden}
  .kpi .lbl{color:var(--muted);font-size:.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .kpi .val{font-size:1.9rem;font-weight:800;margin-top:6px}
  .kpi .delta{font-size:.78rem;color:var(--muted);margin-top:4px}
  .kpi::after{content:"";position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,32,.15),transparent 70%)}
  .btn{padding:10px 18px;border-radius:9px;border:none;font-weight:700;font-size:.86rem;transition:transform .12s}
  .btn:hover{transform:translateY(-1px)}
  .btn-gold{background:var(--accent);color:#0b111b}
  .btn-ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
  .btn-red{background:rgba(255,92,92,.12);color:var(--red);border:1px solid rgba(255,92,92,.3)}
  .btn-sm{padding:6px 12px;font-size:.78rem;border-radius:7px}

  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th{text-align:left;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:1.2px;padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .15s}
  tbody tr:hover{background:rgba(255,255,255,.02)}

  .badge{display:inline-block;padding:3px 11px;border-radius:99px;font-size:.72rem;font-weight:700;white-space:nowrap}
  .bg0{background:rgba(255,255,255,.08);color:#c2cad4}
  .bg1{background:rgba(90,160,255,.14);color:var(--blue)}
  .bg2{background:rgba(167,139,250,.14);color:var(--violet)}
  .bg3{background:rgba(232,160,32,.16);color:var(--accent)}
  .zone-tag{display:inline-block;width:26px;height:26px;border-radius:8px;text-align:center;line-height:26px;font-weight:800;font-size:.8rem}
  .zA{background:rgba(232,160,32,.16);color:var(--accent)}
  .zB{background:rgba(90,160,255,.14);color:var(--blue)}
  .zC{background:rgba(61,220,132,.13);color:var(--green)}
  .zD{background:rgba(167,139,250,.14);color:var(--violet)}

  .prog{height:7px;background:var(--panel-2);border-radius:99px;overflow:hidden;min-width:90px}
  .prog i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .4s}
  .prog i.full{background:linear-gradient(90deg,#2eb872,var(--green))}
  .pct{font-size:.72rem;color:var(--muted);margin-top:4px}

  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:99px;padding:5px 13px;font-size:.78rem;color:var(--muted)}
  .chip b{color:var(--ink)}
  .up{color:var(--green)} .down{color:var(--red)} .gold{color:var(--accent)}

  input.field,select.field,textarea.field{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 13px;font-size:.88rem;width:100%}
  input.field:focus,select.field:focus,textarea.field:focus{outline:none;border-color:var(--accent)}
  label.f-lbl{display:block;font-size:.75rem;color:var(--muted);font-weight:700;margin:0 0 6px;text-transform:uppercase;letter-spacing:1px}
  .f-row{margin-bottom:14px}

  /* modal */
  #modalBg{position:fixed;inset:0;background:rgba(5,8,14,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
  #modalBg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px;width:min(460px,92vw);max-height:88vh;overflow:auto}
  .modal h3{margin-bottom:20px;font-size:1.05rem}

  /* toast */
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel-2);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:13px 22px;font-size:.88rem;z-index:500;transition:transform .3s;box-shadow:0 15px 40px rgba(0,0,0,.4)}
  #toast.show{transform:translateX(-50%) translateY(0)}

  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem}
  .podium{display:flex;gap:14px;align-items:flex-end;justify-content:center;padding:10px 0}
  .pod{flex:1;text-align:center;border-radius:12px 12px 0 0;padding:14px 8px;display:flex;flex-direction:column;justify-content:flex-end}
  .pod .name{font-weight:800;font-size:.85rem}
  .pod .amt{font-size:.75rem;color:var(--muted);margin-top:3px}
  .pod1{background:linear-gradient(180deg,rgba(232,160,32,.25),rgba(232,160,32,.05));min-height:130px;border-top:3px solid var(--accent)}
  .pod2{background:linear-gradient(180deg,rgba(160,175,195,.2),rgba(160,175,195,.04));min-height:100px;border-top:3px solid #a8b6c8}
  .pod3{background:linear-gradient(180deg,rgba(190,120,60,.2),rgba(190,120,60,.04));min-height:80px;border-top:3px solid #c07840}
  .warn{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.25);border-radius:10px;padding:11px 15px;font-size:.83rem;color:#ffb0b0;margin-bottom:16px}
  /* feuilles */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{padding:8px 16px;border-radius:99px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:.82rem;font-weight:700;transition:all .15s}
  .tab:hover{color:var(--ink)}
  .tab.on{background:linear-gradient(135deg,rgba(232,160,32,.2),rgba(232,160,32,.07));color:var(--accent);border-color:rgba(232,160,32,.4)}
  .sheet td{padding:4px 6px}
  .sheet input[type=text],.sheet input[type=number],.sheet input[type=date]{background:transparent;border:1px solid transparent;color:var(--ink);border-radius:6px;padding:6px 8px;font-size:.84rem;width:100%;min-width:70px}
  .sheet input:hover{border-color:var(--line)}
  .sheet input:focus{outline:none;border-color:var(--accent);background:var(--panel-2)}
  .sheet input[type=number]{text-align:right}
  .sheet input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .sheet .calc{font-weight:700;text-align:right;padding:6px 8px;white-space:nowrap}
  .sheet tfoot td{font-weight:800;color:var(--accent);border-top:2px solid var(--line);padding:10px 8px;text-align:right}
  .sheet tfoot td:first-child{text-align:left}
  /* combo clients (autocomplete) */
  .combo{position:relative}
  .combo-list{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:80;display:none;
    background:linear-gradient(165deg,rgba(25,34,52,.97),rgba(15,22,35,.99));backdrop-filter:blur(14px);
    border:1px solid rgba(255,45,149,.28);border-radius:12px;max-height:300px;overflow:auto;
    box-shadow:0 22px 55px rgba(0,0,0,.55), 0 0 26px rgba(139,92,246,.18)}
  .combo-list.open{display:block;animation:fadeUp .18s cubic-bezier(.2,.7,.3,1)}
  .combo-item{padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;
    font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s}
  .combo-item:last-child{border-bottom:none}
  .combo-item small{color:var(--muted);font-size:.75rem;white-space:nowrap}
  .combo-item:hover,.combo-item.sel{background:linear-gradient(90deg,rgba(255,45,149,.16),rgba(139,92,246,.07))}
  .combo-item .match{color:var(--accent);font-weight:800}
  .combo-count{position:sticky;top:0;background:rgba(15,22,35,.98);padding:8px 16px;font-size:.72rem;color:var(--muted);
    letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06)}
  /* facture imprimable */
  #printZone{display:none}
  @media print{
    body>*{display:none!important}
    #printZone{display:block!important;position:absolute;top:0;left:0;width:100%;background:#fff;color:#111}
    #printZone *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  .inv{font-family:'Segoe UI',system-ui,sans-serif;max-width:760px;margin:0 auto;padding:40px;color:#111}
  .inv-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #e8a020;padding-bottom:18px}
  .inv h1{font-size:1.6rem;color:#1b2739}
  .inv h1 b{color:#c4841a}
  .inv .co{font-size:.82rem;color:#444;line-height:1.6}
  .inv-num{text-align:right;font-size:.9rem}
  .inv-num .n{font-size:1.3rem;font-weight:800;color:#c4841a}
  .inv-client{margin:24px 0;display:flex;justify-content:flex-end}
  .inv-client div{background:#f5f6f8;border-radius:8px;padding:14px 20px;font-size:.88rem;line-height:1.7;min-width:240px}
  .inv table{width:100%;border-collapse:collapse;font-size:.85rem;margin:10px 0 20px}
  .inv th{background:#1b2739;color:#fff;padding:9px 10px;text-align:left;font-size:.75rem;letter-spacing:1px;text-transform:uppercase}
  .inv td{padding:8px 10px;border-bottom:1px solid #e3e5e9;color:#222}
  .inv .tots{display:flex;justify-content:flex-end}
  .inv .tots table{width:auto;min-width:280px}
  .inv .tots td{border:none;padding:5px 10px}
  .inv .tots tr:last-child td{border-top:2px solid #1b2739;font-weight:800;font-size:1rem;color:#c4841a}
  .inv .foot{margin-top:34px;display:flex;justify-content:space-between;font-size:.78rem;color:#555}
  .inv .sig{text-align:center}
  .inv .sig .line{margin-top:6px;border-top:1px solid #999;padding-top:6px;min-width:190px}
  .inv .sig .script{font-family:'Segoe Script','Brush Script MT','Lucida Handwriting',cursive;font-size:1.6rem;color:#1b2739;display:inline-block;transform:rotate(-3deg);margin-top:14px}
  .inv .legal{margin-top:26px;padding-top:12px;border-top:1px solid #e3e5e9;font-size:.68rem;color:#8a94a3;text-align:center}
  .promo-flag{font-size:.7rem;color:var(--green);font-weight:700;display:block;margin-top:3px}

  /* ================== UI PREMIUM ================== */
  ::selection{background:rgba(232,160,32,.35)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#2a3850,#1b2436);border-radius:99px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--accent),#b87e14)}

  #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
  main{position:relative;z-index:1}

  /* verre dépoli + halo */
  .panel{
    background:linear-gradient(165deg,rgba(25,34,52,.88),rgba(15,22,35,.94));
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 10px 34px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .25s cubic-bezier(.2,.7,.3,1), box-shadow .25s, border-color .25s;
  }
  .panel:hover{border-color:rgba(232,160,32,.22);box-shadow:0 16px 44px rgba(0,0,0,.35), 0 0 0 1px rgba(232,160,32,.08), inset 0 1px 0 rgba(255,255,255,.06)}
  .kpi:hover{transform:translateY(-5px)}
  .kpi .val{background:linear-gradient(90deg,#fff,#cfd8e6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .kpi .val.gold,.kpi .val .gold{background:linear-gradient(90deg,#f5b23a,#e8a020);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  aside{background:linear-gradient(180deg,rgba(18,26,40,.92),rgba(13,19,30,.96));backdrop-filter:blur(14px)}
  .topbar h2{background:linear-gradient(90deg,#fff 40%,var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  /* boutons */
  .btn,.tab,.nav-item{position:relative;overflow:hidden;transform:translateZ(0)}
  .btn{transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .25s, filter .2s}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0) scale(.96)}
  .btn-gold{background:linear-gradient(135deg,#f7bc4e,#e8a020 55%,#d08e12);box-shadow:0 4px 16px rgba(232,160,32,.28)}
  .btn-gold:hover{box-shadow:0 8px 28px rgba(232,160,32,.45);filter:brightness(1.06)}
  .btn-ghost:hover{border-color:rgba(232,160,32,.45);color:var(--accent-2)}
  .btn-red:hover{box-shadow:0 6px 20px rgba(255,92,92,.25)}
  .rip{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.35),rgba(255,255,255,.12) 60%,transparent);transform:scale(0);animation:rip .6s ease-out forwards;pointer-events:none}
  @keyframes rip{to{transform:scale(2.8);opacity:0}}

  /* navigation */
  .nav-item{transition:all .22s cubic-bezier(.2,.7,.3,1)}
  .nav-item:hover{transform:translateX(4px)}
  .nav-item.active{box-shadow:inset 3px 0 0 var(--accent), 0 4px 18px rgba(232,160,32,.10)}
  .tab{transition:all .2s cubic-bezier(.2,.7,.3,1)}
  .tab:hover{transform:translateY(-2px);border-color:rgba(232,160,32,.3)}
  .tab.on{box-shadow:0 6px 20px rgba(232,160,32,.15)}

  /* champs */
  input.field:focus,select.field:focus,.login-card input:focus,.sheet input:focus{box-shadow:0 0 0 3px rgba(232,160,32,.15)}

  /* entrées en cascade */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes rise{from{opacity:0;transform:translateY(34px)}to{opacity:1;transform:none}}
    @keyframes growX{from{transform:scaleX(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(232,160,32,.18)}50%{box-shadow:0 0 48px rgba(232,160,32,.38)}}
    #main>*{animation:fadeUp .45s cubic-bezier(.2,.7,.3,1) both}
    #main>*:nth-child(2){animation-delay:.07s}
    #main>*:nth-child(3){animation-delay:.14s}
    #main>*:nth-child(4){animation-delay:.21s}
    .grid>.panel{animation:fadeUp .5s cubic-bezier(.2,.7,.3,1) both}
    .grid>.panel:nth-child(2){animation-delay:.08s}
    .grid>.panel:nth-child(3){animation-delay:.16s}
    .grid>.panel:nth-child(4){animation-delay:.24s}
    tbody tr{animation:fadeUp .35s cubic-bezier(.2,.7,.3,1) both}
    tbody tr:nth-child(1){animation-delay:.02s}tbody tr:nth-child(2){animation-delay:.05s}
    tbody tr:nth-child(3){animation-delay:.08s}tbody tr:nth-child(4){animation-delay:.11s}
    tbody tr:nth-child(5){animation-delay:.14s}tbody tr:nth-child(6){animation-delay:.17s}
    tbody tr:nth-child(7){animation-delay:.20s}tbody tr:nth-child(8){animation-delay:.23s}
    .prog i{transform-origin:left;animation:growX .9s cubic-bezier(.2,.7,.3,1) both}
    .pod{animation:rise .65s cubic-bezier(.2,.7,.3,1) both}
    .pod2{animation-delay:.12s}.pod3{animation-delay:.22s}
    .modal{animation:fadeUp .3s cubic-bezier(.2,.7,.3,1)}
    .login-card{animation:rise .7s cubic-bezier(.2,.7,.3,1), glowPulse 5s ease-in-out 1s infinite}
    .login-card img{animation:float 4.5s ease-in-out infinite}
    .zone-tag{transition:transform .25s}
    tr:hover .zone-tag{transform:rotate(-8deg) scale(1.15)}
  #toast{transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
  #login{background:
    radial-gradient(ellipse at 70% 20%, rgba(232,160,32,.14), transparent 55%),
    linear-gradient(160deg,rgba(11,17,27,.86),rgba(22,32,46,.90))}
  .login-card{background:linear-gradient(165deg,rgba(25,34,52,.9),rgba(15,22,35,.96));backdrop-filter:blur(16px)}

  /* ================== NÉON GTA6 ================== */
  :root{--neon-p:#ff2d95;--neon-c:#22d7ee;--neon-v:#8b5cf6}
  body{background:
    radial-gradient(ellipse at 12% -5%, rgba(139,92,246,.16), transparent 50%),
    radial-gradient(ellipse at 90% 105%, rgba(255,45,149,.12), transparent 55%),
    radial-gradient(ellipse at 60% 40%, rgba(34,215,238,.05), transparent 60%),
    var(--bg)}
  aside{border-right:1px solid rgba(255,45,149,.14)}
  .brand b{text-shadow:0 0 14px rgba(232,160,32,.85)}
  .brand small{color:var(--neon-c);text-shadow:0 0 9px rgba(34,215,238,.7)}
  .topbar h2{background:linear-gradient(90deg,#fff 10%,var(--neon-p) 55%,var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(255,45,149,.35))}

<script>
/* ================== CONSTANTES ================== */
const GRADES = [
  {nom:'Intérimaire',        quota:3000, mult:1,   montee:3000,  cls:'bg0'},
  {nom:'Raffineur',          quota:3000, mult:1.5, montee:5000,  cls:'bg1'},
  {nom:'Raffineur Confirmé', quota:5000, mult:2,   montee:8000,  cls:'bg2'},
  {nom:'Raffineur Expert',   quota:6500, mult:2.5, montee:10000, cls:'bg3'},
];
const LS_KEY = 'oilroxwood_admin_v1';
const DEFAULT_HASH = null; // défini au premier login avec le mdp par défaut

/* ================== ÉTAT ================== */
let S = load();
// Réinitialisation unique du mot de passe (juillet 2026) : retour à « roxwood ».
if(!localStorage.getItem('orx_pwfix1')){
  S.passHash=null;
  localStorage.setItem(LS_KEY,JSON.stringify(S));
  localStorage.setItem('orx_pwfix1','1');
}
function defaults(){
  return {
    passHash:null,
    runners:[],
    weeks:[],
    imported:[],
    sheets:null,
    fact:null,
    users:[],
    pending:[],
    settings:{prix:10, primeBase:5000, top:[15000,10000,5000], limite:24000, semaine:1,
      webhook:'https://discord.com/api/webhooks/1247564402782371985/X8pynlKA1sn26In6aONz4IO7XZl7pwtnW19yvmLKX2DiMq_LXEBZRHGW1rBgyes0h9kg'}
  };
}
function load(){
  try{ const d = JSON.parse(localStorage.getItem(LS_KEY)); return d ? Object.assign(defaults(), d) : defaults(); }
  catch(e){ return defaults(); }
}
function save(){ S._maj=Date.now(); localStorage.setItem(LS_KEY, JSON.stringify(S)); sbQueue(); }

/* ================== SYNCHRO SUPABASE (multi-admin temps réel) ================== */
const SB_URL='https://prwdtdmdkhzwfyivaepw.supabase.co';
const SB_KEY='sb_publishable_qgN4fRX9eVdKn3SWAjtmhw_F00rlqXz';
const SYNC={on:false, cli:null, cid:Math.random().toString(36).slice(2), t:null, ready:false};
function syncDot(ok,msg){
  const el=document.getElementById('syncDot');
  if(el){ el.style.background=ok===null?'var(--muted)':ok?'var(--green)':'var(--red)'; el.title=msg||''; }
}
function initSync(){
  if(SYNC.on||!SB_URL||!SB_KEY||typeof supabase==='undefined') return;
  SYNC.cli=supabase.createClient(SB_URL,SB_KEY);
  SYNC.on=true;
  // dès que la session Discord est établie (même après l'échange du code), on tente l'entrée
  SYNC.cli.auth.onAuthStateChange((event,session)=>{
    if(session && sessionStorage.getItem('orx_auth')!=='1') checkDiscordAuth();
  });
  SYNC.cli.channel('etat-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'oilroxwood_etat',filter:'id=eq.1'},p=>{
      const d=p.new&&p.new.data;
      if(!d||d._cid===SYNC.cid) return; // ignore l'écho de nos propres écritures
      if(d._maj&&S._maj&&d._maj<S._maj) return; // jamais d'écrasement par un état plus ancien
      const monPass=S.passHash; // le mot de passe reste propre à chaque navigateur
      S=Object.assign(defaults(),d);
      S.passHash=monPass;
      localStorage.setItem(LS_KEY,JSON.stringify(S));
      if(sessionStorage.getItem('orx_auth')==='1'){ applyPerms(); rerender(); toast('☁️ Mise à jour reçue d\'un autre admin'); }
      else checkDiscordAuth(); // en attente de validation : entre automatiquement dès que la direction valide
    })
    .subscribe(st=>{ if(st==='SUBSCRIBED') syncDot(true,'Temps réel actif'); });
}
async function sbPull(){
  if(!SYNC.on) return;
  try{
    const {data,error}=await SYNC.cli.from('oilroxwood_etat').select('data').eq('id',1).maybeSingle();
    if(error) throw error;
    if(data&&data.data){
      const rem=data.data;
      if(S._maj && rem._maj && rem._maj < S._maj){
        // notre état local est plus récent (envoi perdu ?) : on le repousse au lieu de régresser
        SYNC.ready=true; await sbPushNow();
      } else {
        const monPass=S.passHash; // le mot de passe reste propre à chaque navigateur
        S=Object.assign(defaults(),rem);
        S.passHash=monPass;
        localStorage.setItem(LS_KEY,JSON.stringify(S));
      }
    } else {
      await sbPushNow(); // base vide : on y pousse l'état local (première installation)
    }
    SYNC.ready=true; syncDot(true,'Synchronisé');
  }catch(e){ syncDot(false,'Connexion Supabase impossible'); }
}
function sbQueue(){ if(!SYNC.on||!SYNC.ready) return; clearTimeout(SYNC.t); SYNC.t=setTimeout(sbPushNow,250); }
// filet de sécurité : si on quitte la page avec un envoi en attente, on tente de l'expédier
addEventListener('beforeunload',()=>{ if(SYNC.t){ clearTimeout(SYNC.t); SYNC.t=null; sbPushNow(); } });
async function sbPushNow(){
  if(!SYNC.on) return;
  if(isMembre()) return; // les membres ne modifient jamais l'état partagé
  try{
    const d=JSON.parse(JSON.stringify(S)); d._cid=SYNC.cid;
    delete d.passHash; // jamais synchronisé : chaque navigateur garde le sien
    const {error}=await SYNC.cli.from('oilroxwood_etat').upsert({id:1,data:d,maj:new Date().toISOString()});
    if(error) throw error;
    syncDot(true,'Synchronisé · '+new Date().toLocaleTimeString('fr-FR'));
  }catch(e){ syncDot(false,'Échec d\'envoi — modifs gardées en local'); }
}

/* ================== AUTH ================== */
async function sha(t){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
const ROLES={direction:'Direction',rh:'RH',comptable:'Comptable',commercial:'Commercial',membre:'Membre'};
/* Onglets visibles par rôle — la Direction voit tout, un Membre ne voit que la vue d'ensemble */
const PERMS={
  direction:['overview','effectif','runs','semaine','feuilles','factures','relances','bilan','dlogs','params'],
  rh:       ['overview','effectif','semaine','feuilles','dlogs'],
  comptable:['overview','feuilles','factures','bilan'],
  commercial:['overview','factures','relances','feuilles'],
  membre:   ['effectif'] // lecture seule : uniquement l'effectif
};
function isMembre(){
  if(!S.users||!S.users.length) return false; // phase d'installation
  const cu=currentUser();
  return !cu || cu.role==='membre';
}
function allowedViews(){
  if(!S.users||!S.users.length) return PERMS.direction; // phase d'installation : tout ouvert
  const cu=currentUser();
  return cu ? (PERMS[cu.role]||PERMS.membre) : PERMS.membre; // session sans compte : minimum
}
function applyPerms(){
  const al=allowedViews();
  document.querySelectorAll('.nav-item[data-view]').forEach(b=>{
    b.style.display=al.includes(b.dataset.view)?'':'none';
  });
}
function currentUser(){
  const u=sessionStorage.getItem('orx_user');
  return (S.users||[]).find(x=>x.user.toLowerCase()===String(u||'').toLowerCase())||null;
}
async function doLogin(e){
  e.preventDefault();
  const nomI=(document.getElementById('lg_user').value||'').trim();
  const pw=document.getElementById('pw').value;
  if(!nomI){ document.getElementById('loginErr').textContent='Indique ton identifiant.'; document.getElementById('loginErr').style.display='block'; return false; }
  const h=await sha(pw);
  let u=null, ok=false;
  if(!(S.users&&S.users.length)){
    // premier lancement : le premier compte créé est Direction (mdp initial : roxwood)
    if(pw==='roxwood'){
      S.users=[{id:Date.now(),user:nomI,hash:h,role:'direction'}];
      u=S.users[0]; ok=true; save();
      sendLog('👤 Premier compte créé', `**${nomI}** (Direction) a initialisé l'authentification`, 0x3ddc84);
    }
  } else {
    u=S.users.find(x=>x.user.toLowerCase()===nomI.toLowerCase());
    ok=!!u && u.hash===h;
  }
  if(ok){
    sessionStorage.setItem('orx_auth','1');
    sessionStorage.setItem('orx_user',u.user);
    enter();
  } else {
    document.getElementById('loginErr').textContent='Identifiant ou mot de passe incorrect.';
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pw').value='';
  }
  return false;
}
function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const cu=currentUser(), wu=document.getElementById('whoami');
  if(wu) wu.innerHTML=cu?`👤 <b style="color:var(--ink)">${esc(cu.user)}</b> · ${ROLES[cu.role]||cu.role}`:'';
  applyPerms();
  S.settings.semaine=isoWeek(); save(); // semaine calendaire (S27, S28…)
  show('overview');
  // effectif ← tablette (le pull Supabase a déjà eu lieu au chargement de la page)
  setTimeout(async()=>{
    initSync();
    await ensureSheets();
    const r=isMembre()?null:syncRunners(true);
    S.settings.semaine=isoWeek();
    rerender();
  }, 50);
}
function logout(){
  sessionStorage.removeItem('orx_auth'); sessionStorage.removeItem('orx_user');
  const fin=()=>location.replace(location.pathname); // retire aussi les tokens OAuth de l'URL
  if(SYNC.cli){ SYNC.cli.auth.signOut().then(fin).catch(fin); } else fin();
}

/* ---- Connexion via Discord (OAuth Supabase) ---- */
async function loginDiscord(){
  if(!SYNC.cli) return alert('Connexion Discord indisponible : Supabase injoignable. Utilise l\'identifiant en secours.');
  await SYNC.cli.auth.signInWithOAuth({provider:'discord',options:{
    redirectTo:location.origin+location.pathname,
    queryParams:{prompt:'none'} // saute l'écran d'autorisation si l'appli est déjà approuvée
  }});
}
async function checkDiscordAuth(){
  if(!SYNC.cli) return;
  if(sessionStorage.getItem('orx_auth')==='1') return; // déjà connecté
  try{
    if(!SYNC.ready) await sbPull(); // s'assure d'avoir la liste des comptes partagée avant de décider
    const {data:{session}}=await SYNC.cli.auth.getSession();
    if(!session) return;
    const m=session.user.user_metadata||{};
    const idn=(session.user.identities&&session.user.identities[0]&&session.user.identities[0].identity_data)||{};
    const cc=m.custom_claims||{};
    const pseudo=cc.global_name||m.full_name||m.name||m.preferred_username
      ||idn.custom_claims&&idn.custom_claims.global_name||idn.full_name||idn.name||idn.preferred_username
      ||(m.email||session.user.email||'').split('@')[0]||'inconnu';
    const did=m.provider_id||idn.provider_id||m.sub||session.user.id;
    console.log('[OilRoxwood] identité Discord reçue :',{pseudo,did,user_metadata:m,identity_data:idn});
    let u=(S.users||[]).find(x=>x.did===did)
        ||(S.users||[]).find(x=>String(x.user).toLowerCase()===String(pseudo).toLowerCase());
    if(!u&&!(S.users&&S.users.length)){
      // premier lancement : le premier connecté Discord devient Direction
      u={id:Date.now(),user:pseudo,did,role:'direction'};
      S.users=[u]; save();
      await sbPushNow(); // envoi IMMÉDIAT (sans délai) pour ne pas être écrasé par un pull
      sendLog('👤 Premier compte créé', `**${pseudo}** (Direction) via Discord`, 0x5865F2);
    }
    if(u){
      if(!u.did){ u.did=did; save(); await sbPushNow(); } // liaison définitive au premier login
      sessionStorage.setItem('orx_auth','1');
      sessionStorage.setItem('orx_user',u.user);
      enter();
    } else {
      // inconnu → demande d'accès automatique, la direction n'a plus qu'à cliquer ✓
      if(!S.pending) S.pending=[];
      if(!S.pending.find(x=>x.did===did)){
        S.pending.push({id:Date.now(),user:pseudo,did,date:new Date().toLocaleDateString('fr-FR')});
        save(); await sbPushNow();
        sendLog('🔔 Demande d\'accès au dashboard', `**${pseudo}** attend une validation — Paramètres → Comptes d'accès → ✓`, 0xe8a020, '<@186397473374208000>');
      }
      const d=document.getElementById('lg_denied');
      if(d){ d.style.display='block';
        d.style.background='rgba(232,160,32,.08)'; d.style.borderColor='rgba(232,160,32,.35)'; d.style.color='var(--accent-2)';
        d.innerHTML=`⏳ Demande d'accès envoyée pour <b>${esc(pseudo)}</b>.<br>Dès que la direction valide, cette page se connectera <b>automatiquement</b> — laisse-la ouverte. <a href="#" onclick="logout();return false" style="color:inherit;text-decoration:underline">Changer de compte</a>`;
      }
    }
  }catch(e){ /* session illisible : on reste sur l'écran de connexion */ }
}
// connexion auto différée : attend que tout le script soit chargé avant d'entrer
if(sessionStorage.getItem('orx_auth')==='1') setTimeout(enter,0);

/* ================== HELPERS ================== */
const $ = s => document.querySelector(s);
const fmt = n => (n||0).toLocaleString('fr-FR');
const money = n => fmt(Math.round(n)) + ' $';
const esc = t => String(t??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600); }
/* ---- Logs Discord (webhook compte entreprise) ---- */
function sendLog(title, desc, color, mention){
  const url=(S.settings.webhook||'').trim();
  if(!url.startsWith('https://discord.com/api/webhooks/')) return;
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    username:'Oil Roxwood — Logs',
    content:mention||undefined,
    embeds:[{title, description:desc, color:color||0xe8a020,
      footer:{text:`Semaine ${S.settings.semaine} · Dashboard admin`},
      timestamp:new Date().toISOString()}]
  })}).catch(()=>{});
}
function isoWeek(d=new Date()){
  d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-day);
  const y0=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil(((d-y0)/86400000+1)/7);
}
function weekRange(){
  const now=new Date(), day=(now.getDay()+6)%7; // 0 = lundi
  const mon=new Date(now); mon.setDate(now.getDate()-day);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=d=>d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  return `du ${f(mon)} au ${f(sun)}`;
}
const DIR_GRADE={nom:'Direction',quota:0,mult:2.5,montee:null,cls:'bg3'}; // postes : quota 0, ×2.5, pas de montée
function grade(r){ return r.poste?DIR_GRADE:GRADES[r.grade]; }
function gTitle(r){ return r.poste||grade(r).nom; } // rang réel (Patron, Commercial…) ou grade raffineur
function gCls(r){ return r.poste?(/patron/i.test(r.poste)?'bg3':'bg2'):grade(r).cls; }
function quotaOK(r){ return r.barils >= grade(r).quota; }
function salairesPoste(){
  if(!S.settings.salPoste) S.settings.salPoste={
    'Patron':70000,'Co Patron':70000,'Comptable':50000,'RH':0,
    'Responsable Commercial':0,'Commercial':0,'Graphiste':0};
  return S.settings.salPoste;
}
function salFixeDe(rang){
  const sp=salairesPoste();
  const k=Object.keys(sp).find(x=>x.toLowerCase()===String(rang||'').toLowerCase().trim());
  return k ? (+sp[k]||0) : 0;
}
function caps(){
  if(!S.settings.caps) S.settings.caps={empSal:85000,empPrime:42500,patSal:90000,patPrime:45000};
  return S.settings.caps;
}
function primeProj(r){
  if(!quotaOK(r)) return 0;
  const cap = r.poste && /patron/i.test(r.poste) ? caps().patPrime : caps().empPrime;
  return Math.min(r.barils * grade(r).mult, cap); // barils × multiplicateur du grade, plafonné
}
function eligible(r){ return !r.poste && r.grade < 3 && r.barils >= grade(r).montee; } // montée hebdo, jamais pour la direction

function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }

}

/* ================== SEMAINE & PRIMES ================== */
function prixRecrue(){ return S.settings.prixRecrue??4000; }
/* ---- rémunération commerciale : 45 $/bidon produit ---- */
function estCommercial(r){ return !!(r.poste&&/commercial/i.test(r.poste)); }
function commerciauxActifs(){ return S.runners.filter(r=>estCommercial(r)&&!r.absent); }
function bidonsVendusSem(){ return ((S.sheets&&S.sheets.ventesSem)||[]).reduce((a,v)=>a+nn(v.quantite),0); }
function salaireProdCom(r){
  if(!estCommercial(r)||r.absent) return 0;
  const n=commerciauxActifs().length;
  if(!n) return 0;
  return Math.round(bidonsVendusSem()/n)*(S.settings.prixBidonCom??45);
}
function toggleAbsent(id){
  if(isMembre()) return toast('👀 Consultation seule pour les membres');
  const r=S.runners.find(x=>x.id===id); if(!r) return;
  r.absent=!r.absent;
  save(); sbPushNow(); rerender();
  toast(r.absent?`🌴 ${r.nom} en congé/absence — retiré des calculs commerciaux`:`💼 ${r.nom} de retour — réintégré aux calculs`);
  sendLog(r.absent?'🌴 Absence':'💼 Retour', `**${r.nom}** ${r.absent?'passe en congé/absence':'est de retour'}`, r.absent?0xe8a020:0x3ddc84);
}
function salaireDe(r){
  // 100 % automatique et additif : salaire fixe du poste + production bidons (commerciaux) + recrues (direction)
  const rec=r.poste?nn(r.recrues)*prixRecrue():0;
  const base=salFixeDe(r.poste||'')+salaireProdCom(r)+rec;
  const C=caps();
  return Math.min(base, r.poste&&/patron/i.test(r.poste)?C.patSal:C.empSal);
}
function setRecrues(id,v){
  const r=S.runners.find(x=>x.id===id);
  if(!r) return;
  r.recrues=Math.max(0,v);
  save(); semaine();
  toast(`👥 ${r.nom} : ${r.recrues} recrue(s) → ${money(r.recrues*prixRecrue())}`);
}
let semTri={k:'rang',d:1};
function semSort(k){ semTri=(semTri.k===k)?{k,d:-semTri.d}:{k,d:(k==='nom'||k==='grade')?1:-1}; semaine(); }
async function semaine(){
  await ensureSheets();
  const byB=[...S.runners].sort((a,b)=>b.barils-a.barils);
  const rang=new Map(byB.map((r,i)=>[r.id,i]));
  const items=S.runners.map(r=>{
    const g=grade(r), okk=quotaOK(r), i=rang.get(r.id);
    const sal=salaireDe(r), pr=okk?primeProj(r)+(i<3&&r.barils>0?S.settings.top[i]:0):0;
    return {r,g,okk,i,sal,pr,tot:sal+pr};
  });
  const K=semTri.k, D=semTri.d;
  items.sort((a,b)=>{
    let va,vb;
    if(K==='nom'){va=a.r.nom;vb=b.r.nom}
    else if(K==='grade'){va=gTitle(a.r);vb=gTitle(b.r)}
    else if(K==='barils'){va=a.r.barils;vb=b.r.barils}
    else if(K==='prime'){va=a.pr;vb=b.pr}
    else if(K==='salaire'){va=a.sal;vb=b.sal}
    else if(K==='total'){va=a.tot;vb=b.tot}
    else {va=a.i;vb=b.i}
    return (typeof va==='string'?va.localeCompare(vb):(va-vb))*D;
  });
  const fl=k=>semTri.k===k?(semTri.d>0?' ▲':' ▼'):'';
  const R=items.map(x=>x.r);
  const totalPrimes = R.reduce((a,r)=>a+primeProj(r),0) + S.settings.top.slice(0,Math.min(3,R.length)).reduce((a,b)=>a+b,0);

function closeWeek(){
  if(!S.runners.length) return toast('Aucun runner à clôturer');
  if(!confirm(`Clôturer la semaine ${S.settings.semaine} ?\n\n• Les primes sont figées (quota + TOP 3)\n• Les compteurs hebdo repartent à zéro\n• Les montées de grade éligibles sont appliquées`)) return;
  const sorted=[...S.runners].sort((a,b)=>b.barils-a.barils);
  let primes=0, promus=[];
  sorted.forEach((r,i)=>{
    if(quotaOK(r)) primes+=primeProj(r);
    if(i<3 && r.barils>0) primes+=S.settings.top[i];
  });
  S.runners.forEach(r=>{ if(eligible(r)){ r.grade++; promus.push(r.nom); } });
  S.weeks.push({num:S.settings.semaine, date:new Date().toLocaleDateString('fr-FR'), total:sorted.reduce((a,r)=>a+r.barils,0), primes, winner:sorted[0]?.barils>0?sorted[0].nom:null});
  const w=S.weeks[S.weeks.length-1];
  const podium=sorted.slice(0,3).filter(r=>r.barils>0).map((r,i)=>`${['🥇','🥈','🥉'][i]} **${r.nom}** — ${fmt(r.barils)} barils (+${money(S.settings.top[i])})`).join('\n');

    `**Production totale : ${fmt(w.total)} barils** (CA ${money(w.total*S.settings.prix)})\n**Primes versées : ${money(primes)}**\n\n${podium||'_Aucun run cette semaine_'}${promus.length?`\n\n📈 Promotions : ${promus.map(n=>'**'+n+'**').join(', ')}`:''}`, 0xe8a020);
  S.runners.forEach(r=>{ r.barils=0; r.runs=[]; r.recrues=0; r.lastSync=0; });

}

async function publishStats(){

  if(!token){ toast('⚠️ Ajoute d\'abord un token GitHub dans Paramètres'); return; }
  const sorted=[...S.runners].sort((a,b)=>b.barils-a.barils);
  const data={

    totalBarils:S.runners.reduce((a,r)=>a+r.barils,0),

    effectif:S.runners.length,

  };
  const api='https://api.github.com/repos/Poloveni/OilRoxwood/contents/data/stats-public.json';
  const hdr={Authorization:'Bearer '+token,Accept:'application/vnd.github+json'};
  toast('📡 Publication en cours…');

    const body={message:'📊 Publication des stats publiques',
      content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,1))))};

}

/* ---- Synchronisation Tablette → Effectif runners ---- */
function syncRunners(silent){
  if(!S.sheets||!S.sheets.tablette) return;
  const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
  const MAP={'interimaire':0,'raffineur':1,'raffineur confirme':2,'raffineur expert':3};
  let added=0, updated=0, removed=0;
  const present=new Set();
  S.sheets.tablette.forEach(row=>{
    const nom=String(row.nom||'').trim();
    if(!nom||norm(nom).startsWith('nom')||/^[\d.,\s]+$/.test(nom)) return; // ignore en-têtes et lignes parasites
    const known=MAP[norm(row.rang)];
    const g=known!==undefined?known:0; // hors grades raffineur : quota Intérimaire
    const rang=String(row.rang||'').trim();
    const poste=(known===undefined&&rang&&rang!=='-')?rang:null; // Patron, Commercial, RH…
    present.add(nom.toLowerCase());
    // barils de la semaine = colonne Runs de la Tablette ($ ÷ 5)
    const barilsSem=Math.round(nn(row.runs)/5);
    let r=S.runners.find(x=>x.nom.toLowerCase()===nom.toLowerCase());
    if(r){ if(r.grade!==g&&r.src==='tablette'){ r.grade=g; updated++; } r.src='tablette'; r.poste=poste; }
    else{
      r={id:Date.now()+Math.floor(Math.random()*1e6),nom,discord:'',grade:g,
        barils:0,total:0,runs:[],src:'tablette',poste};
      S.runners.push(r); added++;
    }
    if(r.src==='tablette'){
      if(r.lastSync===undefined){
        // première synchro nouvelle formule : on cale les barils sur la tablette
        r.barils=barilsSem; r.lastSync=barilsSem;
      } else if(barilsSem!==r.lastSync){
        const delta=barilsSem-r.lastSync;
        r.barils=Math.max(0,nn(r.barils)+delta); // les runs saisis à la main sont conservés
        if(delta>0) r.total=nn(r.total)+delta;   // le total carrière cumule les nouveaux barils
        r.lastSync=barilsSem;
        updated++;
      }
    }
  });
  // retire uniquement les runners issus de la tablette qui n'y figurent plus
  for(let i=S.runners.length-1;i>=0;i--){
    const r=S.runners[i];
    if(r.src==='tablette'&&!present.has(r.nom.toLowerCase())){ S.runners.splice(i,1); removed++; }
  }
  if(added||updated||removed){
    save();
    sbPushNow(); // envoi immédiat, sans attendre le différé
    const msg=`🔄 Effectif synchronisé avec la tablette : ${added?'+'+added+' runner(s) ':''}${updated?updated+' grade(s) ajusté(s) ':''}${removed?'-'+removed+' départ(s)':''}`.trim();
    if(!silent){ toast(msg); sendLog('🔄 Sync tablette → effectif', msg.replace('🔄 ',''), 0x22d7ee); }
  }
  return {added,updated,removed};
}

function applyPaste(replace){
  // accepte « 18 000 », « 35 370,00 », « 18000$ », « 12 660 $ »…
  const pn=s=>+String(s||'').replace(/[^\d,.-]/g,'').replace(',','.')||0;
  const rows=$('#pasteZone').value.split(/\r?\n/)
    .map(l=>l.split('\t').map(x=>x.trim()))
    .filter(c=>c[0]&&!/^nom/i.test(c[0])&&!/^[\d.,\s]+$/.test(c[0]))
    .map(c=>({
      nom:c[0], rang:c[1]||'',
      factures:pn(c[2]), runs:pn(c[3]), ventes:pn(c[4]),
      part:pn(c[6]),
      heures:/h/.test(c[c.length-1]||'')?c[c.length-1]:''
    }));
  if(!rows.length) return toast('⚠️ Aucune ligne reconnue — colle bien des colonnes séparées par des tabulations');
  let maj=0, add=0;
  if(replace){
    S.sheets.tablette=rows;
  } else {
    rows.forEach(nr=>{
      const ex=S.sheets.tablette.find(x=>String(x.nom).toLowerCase().trim()===nr.nom.toLowerCase());
      if(ex){ Object.assign(ex,nr); maj++; } else { S.sheets.tablette.push(nr); add++; }
    });
  }
  save(); syncRunners(false); closeModal(); feuilles();
  toast(replace?`♻️ Tablette remplacée : ${rows.length} lignes — effectif resynchronisé`
              :`🔀 Tablette fusionnée : ${maj} mise(s) à jour, ${add} ajout(s) — effectif resynchronisé`);
  sendLog('📋 Import tablette', `${replace?'Remplacement complet':'Fusion'} : **${rows.length} lignes** collées depuis Excel`, 0x22d7ee);
}

function sheetCsv(){
  const def=SHEETS_DEF[curSheet], rows=S.sheets[curSheet];
  const lines=[def.cols.map(c=>c.l).join(';')];
  rows.forEach(r=>lines.push(def.cols.map(c=>c.t==='calc'?Math.round(c.f(r)):String(r[c.k]??'').replace(/;/g,',')).join(';')));

function art(ref){ return S.fact.articles.find(a=>a.ref===ref); }
function cli(nom){ return S.fact.clients.find(c=>c.nom.toLowerCase()===String(nom||'').toLowerCase()); }
function ligneCalc(l){
  const pu = l.pu!==undefined && l.pu!==null ? nn(l.pu) : (art(l.ref)?art(l.ref).prix:0);
  const ht = nn(l.qte)*pu;
  return {pu, ht, ttc: ht*(1+nn(l.tva)), desc: l.desc!==undefined?l.desc:(art(l.ref)?art(l.ref).desc:'')};
}
/* Offre fidélité supprimée (juillet 2026) — plus de bidons offerts automatiques.
   Les anciennes factures conservent leur ligne OFFERT à l'impression. */
function offertQte(){ return 0; }
function factTotaux(f){
  const ls=(f||FD).lignes.map(ligneCalc);
  const off=f?f.offert:offertQte();
  const qte=(f||FD).lignes.reduce((a,l)=>a+nn(l.qte),0)+off;
  return {ht:ls.reduce((a,x)=>a+x.ht,0), ttc:ls.reduce((a,x)=>a+x.ttc,0), qte, poids:qte*2, off};
}

  S.fact={clients:seed.clients,articles:seed.articles,tva:seed.tva||[0,0.02,0.04,0.05],factures:[],compteur:1};

function updL(i,k,v){
  if(k==='ref'){ const l=FD.lignes[i]; l.ref=v==='_libre'?'':v; delete l.desc; delete l.pu; if(v==='Prestation Evenementiel')l.tva=0; }

/* ---- autocomplete clients ---- */
let cliIdx=-1, cliMatches=[];
function hlMatch(nom,q){
  if(!q) return esc(nom);
  const i=nom.toLowerCase().indexOf(q);
  if(i<0) return esc(nom);
  return esc(nom.slice(0,i))+'<span class="match">'+esc(nom.slice(i,i+q.length))+'</span>'+esc(nom.slice(i+q.length));
}
function cliFilter(q){
  const list=document.getElementById('cliList');
  if(!list) return;
  const qq=q.trim().toLowerCase();
  cliMatches=S.fact.clients
    .filter(c=>!qq||c.nom.toLowerCase().includes(qq)||String(c.adresse||'').toLowerCase().includes(qq))
    .slice(0,80);
  cliIdx=-1;
  list.innerHTML=`<div class="combo-count">${cliMatches.length} client(s)${qq?' pour « '+esc(q.trim())+' »':''}</div>`+
    (cliMatches.map((c,i)=>`<div class="combo-item" onmousedown="cliPick(${i})">
      <span>${hlMatch(c.nom,qq)}</span><small>📍 ${esc(c.adresse||'—')}</small></div>`).join('')
    ||'<div class="combo-item" style="cursor:default"><small>Aucun résultat — le nom saisi sera un client hors base</small></div>');
  list.classList.add('open');
}
let cliJustPicked=false;
function cliPick(i){ if(cliMatches[i]){ cliJustPicked=true; FD.client=cliMatches[i].nom; fNew(); } }
function cliBlur(val){
  setTimeout(()=>{
    const l=document.getElementById('cliList'); if(l) l.classList.remove('open');
    if(cliJustPicked){ cliJustPicked=false; return; } // une sélection vient d'être faite : on n'écrase pas
    if(FD.client!==val){ FD.client=val; fNew(); }     // saisie manuelle (client hors base)
  },160);
}
function cliKey(e){
  const list=document.getElementById('cliList');
  if(!list||!list.classList.contains('open')) return;
  const items=[...list.querySelectorAll('.combo-item')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    cliIdx=Math.max(0,Math.min(cliMatches.length-1,cliIdx+(e.key==='ArrowDown'?1:-1)));
    items.forEach((el,i)=>el.classList.toggle('sel',i===cliIdx));
    if(items[cliIdx]) items[cliIdx].scrollIntoView({block:'nearest'});
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(cliIdx>-1) cliPick(cliIdx);
    else{ FD.client=e.target.value; fNew(); }
  }else if(e.key==='Escape'){ list.classList.remove('open'); }
}

function draftAsFact(){
  const t=factTotaux();
  return {num:FD.num,date:FD.date,client:FD.client,emetteur:FD.emetteur,
    lignes:FD.lignes.map(l=>({...l,...ligneCalc(l)})),offert:t.off,ht:t.ht,ttc:t.ttc,poids:t.poids,statut:'attente'};

function saveFact(){
  if(!FD.client) return toast('⚠️ Indique le client');
  if(!factTotaux().ttc) return toast('⚠️ La facture est vide');
  S.fact.factures.unshift(draftAsFact());
  S.fact.compteur=Math.max(S.fact.compteur+1,FD.num+1);
  // cohérence Relances : la facture met à jour la dernière commande du client et clôt la relance en cours
  const cRel=cli(FD.client);
  if(cRel){ cRel.lastCmd=FD.date; delete cRel.relance; }
  // cohérence Ventes de la semaine : les bidons facturés s'y ajoutent automatiquement
  const qteB=FD.lignes.filter(l=>l.ref==='CMD'||/bidon/i.test(ligneCalc(l).desc||'')).reduce((a,l)=>a+nn(l.qte),0);
  if(qteB>0){
    const addVente=()=>{ S.sheets.ventesSem.push({date:FD.date,client:FD.client,quantite:qteB,qui:FD.emetteur||''}); save(); };
    if(S.sheets&&S.sheets.ventesSem) addVente(); else ensureSheets().then(addVente);

  sendLog('🧾 Facture n°'+FD.num, `Client : **${FD.client}**\nTotal TTC : **${money(factTotaux().ttc)}**\nÉmise par : ${FD.emetteur||'—'}`, 0xa78bfa);

}

  // charge le seed pour les feuilles manquantes (première fois OU nouvelles feuilles ajoutées)
  const missing = S.sheets ? Object.keys(SHEETS_DEF).filter(k=>!S.sheets[k]) : Object.keys(SHEETS_DEF);
  if(S.sheets && !missing.length) return;
  if(!S.sheets) S.sheets={};
  try{
    const r=await fetch('data/feuilles-seed.json?ts='+Date.now(),{cache:'no-store'});
    const d=await r.json();
    missing.forEach(k=>S.sheets[k]=d[k]||[]);
  }catch(e){
    missing.forEach(k=>S.sheets[k]=[]);
  }
  save();
}

/* ================== BILAN COMPTABLE ================== */
function bilanData(){
  const T=S.sheets.tablette||[], CPT=S.sheets.compta||[];
  const byB=[...S.runners].sort((a,b)=>b.barils-a.barils);
  const rangTop=new Map(byB.map((r,i)=>[r.id,i]));
  const low=s=>String(s||'').toLowerCase().trim();
  const isPatron=r=>/patron/i.test(r.rang||'');
  const lignes=T.filter(r=>r.nom&&!low(r.nom).startsWith('nom')).map(r=>{
    const C=caps();
    // tout est automatique : prod. bidons, recrues, salaire fixe, prime hebdo + TOP 3
    const run=S.runners.find(x=>x.nom.toLowerCase()===low(r.nom));
    const rec=(run&&run.poste)?nn(run.recrues)*prixRecrue():0;
    const prodCom=run?salaireProdCom(run):0;
    const base=salFixeDe(r.rang)+prodCom+rec; // additif, comme la feuille Excel d'origine
    const sal=Math.min(base, isPatron(r)?C.patSal:C.empSal);
    const topB=run&&rangTop.get(run.id)<3&&run.barils>0?S.settings.top[rangTop.get(run.id)]:0;
    const prime=run?Math.min(primeProj(run)+topB,isPatron(r)?C.patPrime:C.empPrime):0;
    return {nom:r.nom,rang:r.rang,run:nn(r.runs),facture:nn(r.factures),vente:nn(r.ventes),
      ca:nn(r.runs)+nn(r.factures)+nn(r.ventes),sal,prime};
  });
  // lignes ajoutées à la main (hors tablette) — CA total calculé automatiquement
  (S.bilanExtra||[]).forEach(x=>{
    lignes.push({nom:x.nom||'—',rang:x.grade||'Manuel',run:nn(x.run),facture:nn(x.facture),vente:nn(x.vente),
      ca:nn(x.run)+nn(x.facture)+nn(x.vente),sal:nn(x.salaire),prime:nn(x.prime),manuel:true});
  });
  const caBrut=lignes.reduce((a,l)=>a+l.ca,0);
  const masseSal=lignes.reduce((a,l)=>a+l.sal,0);
  const totalPrimes=lignes.reduce((a,l)=>a+l.prime,0);
  const depDed=CPT.filter(c=>/d[ée]pense/i.test(c.type)).reduce((a,c)=>a+nn(c.montant),0);
  const retraits=CPT.filter(c=>/retrait/i.test(c.type)).reduce((a,c)=>a+nn(c.montant),0);
  // méthode compta FBFA : impôt sur (CA − salaires − dépenses), primes déduites APRÈS impôt
  const depenses=masseSal+depDed;
  const benefice=caBrut-depenses;
  const taux=S.settings.impot??0.29;
  const impots=Math.max(0,benefice*taux);
  const apresImpot=benefice-impots;
  const apresPrimes=apresImpot-totalPrimes;
  return {lignes,caBrut,masseSal,totalPrimes,depDed,retraits,depenses,benefice,taux,impots,apresImpot,apresPrimes,net:apresPrimes-retraits};
}

/* ---- export prêt à coller dans le GDoc de compta ---- */
function bilanCopy(){
  const B=bilanData();
  const rows=B.lignes.filter(l=>l.manuel||l.ca>0||l.sal>0||l.prime>0);
  const $n=v=>Math.round(v)+'$';
  const L=[['Nom du salarié','Grade','RUN','FACTURE','VENTE','CA TOTAL RÉALISÉ','Salaire','Prime'].join('\t')];
  rows.forEach(l=>L.push([l.nom,l.rang,$n(l.run),$n(l.facture),$n(l.vente),$n(l.ca),$n(l.sal),$n(l.prime)].join('\t')));
  L.push('');
  L.push(['CA Brut',$n(B.caBrut)].join('\t'));
  L.push(['Dépenses déductibles',$n(B.depenses)].join('\t'));
  L.push(['Bénéfice',$n(B.benefice)].join('\t'));
  L.push(['Taux d\'imposition',Math.round(B.taux*100)+'%'].join('\t'));
  L.push(['Montant des impôts',$n(B.impots)].join('\t'));
  L.push(['Bénéfice après impôt',$n(B.apresImpot)].join('\t'));
  L.push(['Montant total des primes',$n(B.totalPrimes)].join('\t'));
  L.push(['Bénéfice après primes',$n(B.apresPrimes)].join('\t'));
  L.push(['Retraits',$n(B.retraits)].join('\t'));
  L.push(['Trésorerie nette',$n(B.net)].join('\t'));
  navigator.clipboard.writeText(L.join('\n'))
    .then(()=>toast('📋 Bilan copié — colle-le tel quel dans ton GDoc (les colonnes se placent toutes seules)'))
    .catch(()=>toast('⚠️ Copie refusée par le navigateur — réessaie après un clic sur la page'));
}

      <td>${TYPE_ICON[m.type]||'📄'} <span style="font-size:.72rem;color:var(--muted)">${m.type}</span></td>
      <td><b>${esc(m.nom||m.auteur)}</b>${r?` <span class="badge ${grade(r).cls}" style="font-size:.65rem">${grade(r).nom}</span>`:(m.nom?' <span class="down" style="font-size:.7rem">inconnu</span>':'')}</td>
      <td style="max-width:340px;font-size:.8rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(m.texte)}">${esc(m.texte.split('\n')[0])}</td>
      <td>${m.quantite?`<b>${fmt(m.quantite)}</b>`:'—'}${m.montant?`<div class="gold" style="font-size:.72rem">${money(m.montant)}</div>`:''}</td>
      <td style="text-align:right">${done?'<span class="up" style="font-size:.75rem">✔ importé</span>':canImp?`
        <select class="field" style="width:130px;display:inline-block;padding:5px 8px;font-size:.75rem" id="sel_${m.id}">
          ${S.runners.map(x=>`<option value="${x.id}" ${r&&x.id===r.id?'selected':''}>${esc(x.nom)}</option>`).join('')}
        </select>
        <button class="btn btn-sm btn-gold" onclick="importLog('${m.id}',${m.quantite})">⬇</button>`:''}</td>
    </tr>`;
  }).join('');
  const auto = importables.filter(m=>match(m.nom));
  $('#main').innerHTML = `
  <div class="topbar">
    <div><h2>Logs Discord</h2><div class="sub">Dernière synchro : ${new Date(d.maj).toLocaleString('fr-FR')} · ${d.messages.length} messages</div></div>
    <div style="display:flex;gap:10px">
      ${auto.length?`<button class="btn btn-gold" onclick="importAll()">⬇ Importer les ${auto.length} runs reconnus</button>`:''}
      <button class="btn btn-ghost" onclick="dlogs()">↻ Rafraîchir</button>
    </div>
  </div>
  ${importables.length?`<div class="warn" style="border-color:rgba(232,160,32,.35);background:rgba(232,160,32,.07);color:var(--accent)">📥 ${importables.length} entrée(s) avec quantité détectée en attente d'import${auto.length?` — dont ${auto.length} avec runner reconnu automatiquement`:''}</div>`:''}
  <div class="panel" style="padding:8px 16px;overflow-x:auto">
    <table><thead><tr><th>Date</th><th>Type</th><th>Qui</th><th>Message</th><th>Quantité</th><th style="text-align:right">Import</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
  window._dlogsData = d;
}
function importLog(id, qte){
  const rid = +document.getElementById('sel_'+id).value;
  const r = S.runners.find(x=>x.id===rid);
  if(!r) return;
  r.runs.push({t:Date.now(),b:qte}); r.barils+=qte; r.total+=qte;
  S.imported.push(id); save(); dlogs();
  toast(`⬇ ${r.nom} : +${fmt(qte)} barils importés depuis Discord`);
}
function importAll(){
  const d = window._dlogsData; if(!d) return;
  const match = n => n ? S.runners.find(r => r.nom.toLowerCase()===n.toLowerCase() || r.discord.toLowerCase()===n.toLowerCase() || n.toLowerCase().includes(r.nom.toLowerCase())) : null;
  let n=0;
  d.messages.forEach(m=>{
    if(!m.quantite || S.imported.includes(m.id)) return;
    const r = match(m.nom); if(!r) return;
    r.runs.push({t:Date.now(),b:m.quantite}); r.barils+=m.quantite; r.total+=m.quantite;
    S.imported.push(m.id); n++;
  });
  save(); dlogs(); toast(`⬇ ${n} run(s) importé(s) depuis les logs Discord`);
}

async function changePw(){
  const cu=currentUser();
  if(!cu) return toast('⚠️ Session inconnue — reconnecte-toi');
  const a=$('#p_pw1').value, b=$('#p_pw2').value;
  if(a.length<4) return toast('⚠️ 4 caractères minimum');
  if(a!==b) return toast('⚠️ Les mots de passe ne correspondent pas');
  cu.hash=await sha(a); save(); toast('🔐 Mot de passe modifié pour '+cu.user);
  $('#p_pw1').value=$('#p_pw2').value='';
}
async function addUser(){
  const u=$('#nu_user').value.trim(), p=$('#nu_pw').value, r=$('#nu_role').value;
  if(u.length<2) return toast('⚠️ Identifiant trop court');
  if(p.length<4) return toast('⚠️ Mot de passe : 4 caractères minimum');
  if(S.users.find(x=>x.user.toLowerCase()===u.toLowerCase())) return toast('⚠️ Cet identifiant existe déjà');
  S.users.push({id:Date.now(),user:u,hash:await sha(p),role:r});
  save(); params(); toast('✅ Compte '+u+' créé ('+ROLES[r]+')');
  sendLog('👤 Nouveau compte dashboard', `**${u}** (${ROLES[r]}) créé par ${currentUser()?currentUser().user:'?'}`, 0x3ddc84);
}
function setUserRole(id,r){
  const u=S.users.find(x=>x.id===id); if(!u) return;
  const dirs=S.users.filter(x=>x.role==='direction');
  if(u.role==='direction'&&r!=='direction'&&dirs.length<=1){ params(); return toast('⚠️ Il faut garder au moins un compte Direction'); }
  u.role=r; save(); toast('👤 '+u.user+' → '+ROLES[r]);
}
async function resetUserPw(id){
  const u=S.users.find(x=>x.id===id); if(!u) return;
  const p=prompt('Nouveau mot de passe pour '+u.user+' :');
  if(!p) return;
  if(p.length<4) return toast('⚠️ 4 caractères minimum');
  u.hash=await sha(p); save(); toast('🔑 Mot de passe réinitialisé pour '+u.user);
}
async function approvePending(id){
  const p=(S.pending||[]).find(x=>x.id===id); if(!p) return;
  if(!S.users.find(x=>x.did===p.did))
    S.users.push({id:Date.now(),user:p.user,did:p.did,role:'membre'});
  S.pending=S.pending.filter(x=>x.id!==id);
  save(); await sbPushNow(); params();
  toast('✅ '+p.user+' validé — il entre automatiquement (rôle Membre, modifiable ci-dessous)');
  sendLog('✅ Accès validé', `**${p.user}** a maintenant accès au dashboard (Membre)`, 0x3ddc84);
}
async function refusePending(id){
  const p=(S.pending||[]).find(x=>x.id===id); if(!p) return;
  S.pending=S.pending.filter(x=>x.id!==id);
  save(); await sbPushNow(); params(); toast('Demande de '+p.user+' refusée');
}
function delUser(id){
  const u=S.users.find(x=>x.id===id); if(!u) return;
  const cu=currentUser();
  if(cu&&u.id===cu.id) return toast('⚠️ Impossible de supprimer ton propre compte');
  if(u.role==='direction'&&S.users.filter(x=>x.role==='direction').length<=1) return toast('⚠️ Il faut garder au moins un compte Direction');
  if(confirm('Supprimer le compte '+u.user+' ?')){
    S.users=S.users.filter(x=>x.id!==id); save(); params(); toast('Compte supprimé');
  }
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`oilroxwood_S${S.settings.semaine}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('⬇️ Export téléchargé');
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const d=JSON.parse(rd.result);
    if(!d.runners||!d.settings) throw 0;
    S=Object.assign(defaults(),d); save(); rerender(); toast('⬆️ Données importées');
  }catch(e){ toast('⚠️ Fichier invalide'); } };
  rd.readAsText(f); inp.value='';
}
async function reloadSheets(){
  if(!confirm('Recharger toutes les feuilles depuis le dépôt GitHub ?\n\nLes modifications faites localement dans les feuilles seront remplacées par la version du dépôt. (Runners, factures et paramètres ne sont pas touchés.)')) return;
  S.sheets=null; save();
  await ensureSheets();
  syncRunners(false);
  rerender();
  toast('♻️ Feuilles rechargées et effectif resynchronisé');

function resetAll(){
  if(confirm('Tout effacer ? (runners, semaines, paramètres)') && confirm('Vraiment sûr ? Cette action est définitive.')){
    const h=S.passHash; S=defaults(); S.passHash=h; save(); rerender(); toast('Données réinitialisées');

/* ================== UI PREMIUM : canvas, ripple, compteurs ================== */
const MOTION_OK = true; // animations toujours actives (demande du patron 😄)

/* ---- fond animé : particules d'or noir reliées ---- */
(function(){
  if(!MOTION_OK) return;
  const cv=document.createElement('canvas'); cv.id='bgCanvas'; document.body.prepend(cv);
  const cx=cv.getContext('2d'); let W,H,PS=[];
  function rs(){
    W=cv.width=innerWidth; H=cv.height=innerHeight;
    const N=Math.min(95, Math.floor(innerWidth/16));
    const COLS=['232,160,32','232,160,32','255,45,149','34,215,238','139,92,246'];
    if(PS.length!==N) PS=Array.from({length:N},()=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.45, vy:(Math.random()-.5)*.45,
      r:Math.random()*2.2+.8, o:Math.random()*.5+.4,
      tw:Math.random()*6.28, ts:.008+Math.random()*.02,
      c:COLS[Math.floor(Math.random()*COLS.length)]
    }));
  }
  addEventListener('resize',rs); rs();
  const LINK=145, MOUSE=190;
  const M={x:-9999,y:-9999};
  addEventListener('pointermove',e=>{M.x=e.clientX;M.y=e.clientY});
  addEventListener('pointerleave',()=>{M.x=M.y=-9999});
  (function tick(){
    requestAnimationFrame(tick);
    if(document.hidden) return;
    cx.clearRect(0,0,W,H);
    for(const p of PS){
      p.x+=p.vx; p.y+=p.vy; p.tw+=p.ts;
      if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
      if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;
      const glow=(Math.sin(p.tw)+1)/2;
      cx.shadowColor=`rgba(${p.c},.9)`; cx.shadowBlur=8+glow*8;
      cx.beginPath(); cx.arc(p.x,p.y,p.r,0,6.2832);
      cx.fillStyle=`rgba(${p.c},${(p.o*(.45+.55*glow)).toFixed(3)})`;
      cx.fill();
    }
    cx.shadowBlur=0;
    for(let i=0;i<PS.length;i++)for(let j=i+1;j<PS.length;j++){
      const a=PS[i],b=PS[j],dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
      if(d2<LINK*LINK){
        cx.strokeStyle=`rgba(${a.c},${((1-Math.sqrt(d2)/LINK)*.13).toFixed(3)})`;
        cx.lineWidth=1; cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y); cx.stroke();
      }
    }
    /* halo interactif : les particules proches du curseur se relient à lui */
    for(const p of PS){
      const dx=p.x-M.x, dy=p.y-M.y, d2=dx*dx+dy*dy;
      if(d2<MOUSE*MOUSE){
        const t=1-Math.sqrt(d2)/MOUSE;
        cx.strokeStyle=`rgba(34,215,238,${(t*.30).toFixed(3)})`;
        cx.lineWidth=1.2; cx.beginPath(); cx.moveTo(p.x,p.y); cx.lineTo(M.x,M.y); cx.stroke();
        p.vx+=dx/18000; p.vy+=dy/18000;
      }
      const sp=Math.hypot(p.vx,p.vy);
      if(sp>.9){p.vx*=.9/sp;p.vy*=.9/sp}
    }
  })();
})();

/* ---- effet ripple sur boutons / onglets / navigation ---- */
document.addEventListener('pointerdown',e=>{
  const b=e.target.closest('.btn,.tab,.nav-item,.login-card button');
  if(!b) return;
  const rect=b.getBoundingClientRect(), d=Math.max(rect.width,rect.height)*1.2;
  const r=document.createElement('span'); r.className='rip';
  r.style.cssText=`width:${d}px;height:${d}px;left:${e.clientX-rect.left-d/2}px;top:${e.clientY-rect.top-d/2}px`;
  b.appendChild(r); setTimeout(()=>r.remove(),650);
});

/* ---- compteurs animés sur les KPI ---- */
function animateCounters(){
  if(!MOTION_OK) return;
  document.querySelectorAll('.kpi .val').forEach(el=>{
    if(el.dataset.anim) return; el.dataset.anim='1';
    const tn=el.firstChild;
    if(!tn || tn.nodeType!==3) return;
    const m=tn.textContent.match(/^([\d\s  .,]*\d)(.*)$/);
    if(!m) return;
    const target=parseInt(m[1].replace(/[^\d]/g,''),10), suffix=m[2]||'';
    if(!isFinite(target)||target<=0||target>1e9) return;
    const t0=performance.now(), dur=850;
    (function step(t){
      const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
      tn.textContent=Math.round(target*e).toLocaleString('fr-FR')+suffix;
      if(p<1) requestAnimationFrame(step);
    })(t0);
  });
}
new MutationObserver(()=>animateCounters()).observe(document.getElementById('main'),{childList:true});

  const hint=document.getElementById('lg_hint');
  const majHint=()=>{ if(hint) hint.style.display=(S.users&&S.users.length)?'none':'block'; };
  majHint();
  initSync();
  sbPull().then(()=>{ majHint(); checkDiscordAuth(); });
})();
